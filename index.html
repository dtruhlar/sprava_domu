<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Správa AMK</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1, h2, h3 { color: #2c3e50; margin-top: 0; }
        label { display: block; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; color: #7f8c8d; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; transition:0.2s; }
        .btn:hover { opacity:0.9; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #27ae60; color: white; }
        .btn-red { background: #e74c3c; color: white; }
        .btn-gray { background: #ecf0f1; color: #333; border: 1px solid #bdc3c7; }
        .btn-small { padding: 6px 12px; font-size: 12px; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; min-width: 600px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; font-size: 13px; color: #7f8c8d; border-bottom: 2px solid #ddd; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .hidden { display: none !important; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; overflow-y: auto; padding: 20px; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; max-width: 850px; margin: auto; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-right: 5px; display: inline-block; margin-bottom:3px; }
        .b-ok { background: #d4edda; color: #155724; }
        .b-wait { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab { padding: 12px 25px; cursor: pointer; font-weight: bold; color: #7f8c8d; border-bottom: 3px solid transparent; margin-bottom: -2px; }
        .tab.active { color: #3498db; border-bottom: 3px solid #3498db; }
        .box-section { background: #f8f9fa; padding: 20px; border-radius: 6px; border: 1px solid #e9ecef; margin-bottom: 20px; }
        .tenant-list { max-height: 150px; overflow-y: auto; background: white; border: 1px solid #ccc; padding: 10px; border-radius: 4px; margin-bottom: 15px; }
        .tenant-list label { display: block; font-weight: normal; text-transform: none; color: #333; margin-bottom: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="loginSection">
    <div class="container" style="max-width: 400px; margin-top: 80px;">
        <h2 style="text-align: center;">Přihlášení</h2>
        <label>E-mail</label><input type="email" id="email">
        <label>Heslo</label><input type="password" id="pass">
        <button class="btn btn-blue" style="width:100%" onclick="handleLogin()">Vstoupit do systému</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <h1 id="appHeader" style="margin:0;">Administrace AMK</h1>
            <button class="btn btn-red" onclick="logout()">Odhlásit se</button>
        </div>

        <div id="adminContent">
            <div class="tabs">
                <div class="tab active" id="tab-btn-tenants" onclick="switchTab('tenants')">Karty nájemníků</div>
                <div class="tab" id="tab-btn-shared" onclick="switchTab('shared')">Společné náklady</div>
            </div>

            <div id="tab-tenants">
                <button class="btn btn-green" onclick="openEdit(null)">+ Přidat nájemníka</button>
                <div class="table-responsive">
                    <table>
                        <thead><tr><th>NÁJEMNÍK</th><th>JEDNOTKA</th><th>STAV PLATEB</th><th>AKCE</th></tr></thead>
                        <tbody id="tBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-shared" class="hidden">
                <div style="display:flex; align-items:flex-end; gap:20px; margin-bottom: 20px;">
                    <div style="flex:1;"><label>Rok rozúčtování</label><input type="number" id="shared-year" onchange="loadSharedCosts()"></div>
                    <button class="btn btn-blue" onclick="loadSharedCosts()">Načíst data</button>
                </div>
                
                <div class="grid">
                    <div class="box-section">
                        <h3 style="color:#3498db">1. Vodné a Stočné</h3>
                        <div id="voda-segments"></div>
                        <button class="btn btn-gray btn-small" onclick="addVodaRow()">+ Úsek</button>
                        <div style="background:#eef7ff; padding:8px; font-weight:bold; margin-top:10px;">
                            Celkem: <span id="sc-voda-celkem-cena">0</span> Kč / <span id="sc-voda-celkem-m3">0</span> m³
                        </div>
                        <label>Rozúčtovat mezi:</label>
                        <div class="tenant-list" id="list-voda"></div>
                    </div>

                    <div class="box-section">
                        <h3 style="color:#2980b9">2. Srážkovné</h3>
                        <div id="srazky-segments"></div>
                        <button class="btn btn-gray btn-small" onclick="addSrazkyRow()">+ Úsek</button>
                        <div style="background:#eef7ff; padding:8px; font-weight:bold; margin-top:10px;">
                            Celkem: <span id="sc-srazky-celkem-cena">0</span> Kč
                        </div>
                        <label>Rozúčtovat (m²) mezi:</label>
                        <div class="tenant-list" id="list-srazky"></div>
                    </div>
                </div>

                <div class="grid">
                    <div class="box-section">
                        <h3 style="color:#f39c12">3. Společná elektřina</h3>
                        <div class="grid">
                            <div><label>Hlavní start</label><input type="number" id="sc-ele-hlavni-start" oninput="calcEleSazba()"></div>
                            <div><label>Hlavní konec</label><input type="number" id="sc-ele-hlavni-end" oninput="calcEleSazba()"></div>
                        </div>
                        <div class="grid">
                            <div><label>Zasedačka start</label><input type="number" id="sc-ele-podruzny-start"></div>
                            <div><label>Zasedačka konec</label><input type="number" id="sc-ele-podruzny-end"></div>
                        </div>
                        <label>Cena faktury celkem (Kč)</label><input type="number" id="sc-ele-celkem-cena" oninput="calcEleSazba()">
                        <div style="font-weight:bold;">Vypočtená sazba: <span id="sc-ele-sazba-display">0</span> Kč/kWh</div>
                        <input type="hidden" id="sc-ele-sazba">
                        <label>Rozúčtovat (OSM) mezi:</label>
                        <div class="tenant-list" id="list-ele"></div>
                    </div>

                    <div class="box-section">
                        <h3 style="color:#27ae60">4. Odpady a 5. Úklid</h3>
                        <label>Čistá Plzeň (Byty) - Kč</label><input type="number" id="sc-odpadyCP-cena">
                        <div class="tenant-list" id="list-odpadyCP"></div>
                        <hr>
                        <label>AVE (Komerce) - Kč</label><input type="number" id="sc-odpadyAVE-cena">
                        <div class="tenant-list" id="list-odpadyAVE"></div>
                        <hr>
                        <label>Úklid - Kč</label><input type="number" id="sc-uklid-cena">
                        <div class="tenant-list" id="list-uklid"></div>
                    </div>
                </div>

                <div class="grid">
                    <button class="btn btn-green" onclick="saveSharedCosts()">💾 Uložit náklady objektu</button>
                    <button class="btn btn-blue" onclick="previewSharedCosts()">📊 Náhled podílů</button>
                </div>
                
                <div id="preview-section" class="hidden">
                    <table style="font-size:12px;">
                        <thead><tr><th>Nájemník</th><th>Voda</th><th>Srážk.</th><th>Ele.</th><th>Odpady</th><th>Úklid</th><th>CELKEM</th></tr></thead>
                        <tbody id="preview-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Karta nájemníka</h2>
        <input type="hidden" id="f-rowidx">
        <div class="grid">
            <div><label>Jméno / Název</label><input type="text" id="f-name"></div>
            <div><label>Jednotka</label><input type="text" id="f-unit"></div>
        </div>
        
        <div class="box-section">
            <label style="color:#2c3e50">Historie osob (OSM) pro zpětné vyúčtování</label>
            <div id="osm-container"></div>
            <button class="btn btn-gray btn-small" onclick="addOsmRow()">+ Přidat rok/období</button>
        </div>

        <div class="grid">
            <div><label>Plocha (m²)</label><input type="number" id="f-plocha"></div>
            <div><label>Zálohy (Kč)</label><input type="number" id="f-zalohy"></div>
        </div>
        <div class="grid">
            <div><label>Nájem (Kč)</label><input type="number" id="f-najem"></div>
            <div><label>Variabilní symbol</label><input type="text" id="f-vs"></div>
        </div>
        <div class="grid">
            <div><label>Email</label><input type="text" id="f-email"></div>
            <div><label>Telefon</label><input type="text" id="f-telefon"></div>
        </div>
        <div class="grid-3">
            <div><label>Město</label><input type="text" id="f-city"></div>
            <div><label>PSČ</label><input type="text" id="f-zip"></div>
            <div><label>Typ</label>
                <select id="f-typ"><option value="byt">Byt</option><option value="komerce">Komerce</option></select>
            </div>
        </div>
        <div id="meterSection"></div>
        <div class="grid">
            <button id="saveBtn" class="btn btn-green" onclick="handleSave()">Uložit kartu</button>
            <button class="btn btn-blue" onclick="generateSettlement()">Vytisknout vyúčtování</button>
        </div>
        <button class="btn btn-gray" style="width:100%; margin-top:10px;" onclick="closeModal()">Zavřít</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzfm7aHYnfodOGT1BRlmtQexj67oMFPNCfgQlOn1WLyJbivwyrdghxKJlrgA8_pni6Y/exec";
    let DATA = null; let USER = null;

    function getNextId(list) {
        if (!list || list.length === 0) return 1;
        const ids = list.map(i => Number(i.id)).filter(id => !isNaN(id)).sort((a,b) => a-b);
        let next = 1;
        for (let i=0; i<ids.length; i++) { if (ids[i] === next) next++; else if (ids[i] > next) return next; }
        return next;
    }

    function addOsmRow(rok = new Date().getFullYear(), osoby = 1, mesice = 12) {
        const div = document.createElement('div');
        div.className = 'grid-3 osm-row';
        div.style.marginBottom = '10px';
        div.innerHTML = `
            <input type="number" class="osm-rok" value="${rok}" placeholder="Rok">
            <input type="number" class="osm-osoby" value="${osoby}" placeholder="Osoby">
            <input type="number" class="osm-mesice" value="${mesice}" placeholder="Měsíce">
            <button class="btn btn-red btn-small" onclick="this.parentElement.remove()" style="grid-column: span 3; margin-top:-10px">Odstranit</button>
        `;
        document.getElementById('osm-container').appendChild(div);
    }

    async function handleLogin() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const resp = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'login', email, password:pass}) });
        const res = await resp.json();
        if(res.success) { DATA = res.allData; startApp(); } else { alert(res.msg); }
    }

    function startApp() {
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        renderAdminTable();
    }

    function renderAdminTable() {
        const tBody = document.getElementById('tBody');
        tBody.innerHTML = (DATA.tenants || []).map(t => `<tr>
            <td><b>${t.name}</b></td><td>${t.unit}</td>
            <td><span class="badge b-ok">OK</span></td>
            <td><button class="btn btn-blue" onclick="openEdit(${t.rowidx})">Karta</button></td>
        </tr>`).join('');
    }

    function openEdit(idx) {
        const container = document.getElementById('osm-container');
        container.innerHTML = "";
        if(!idx) {
            document.getElementById('f-rowidx').value = "";
            document.querySelectorAll('#modal input').forEach(i => i.value = "");
            addOsmRow();
        } else {
            const t = DATA.tenants.find(x => x.rowidx == idx);
            document.getElementById('f-rowidx').value = t.rowidx;
            document.getElementById('f-name').value = t.name;
            document.getElementById('f-unit').value = t.unit;
            document.getElementById('f-plocha').value = t.plocha;
            document.getElementById('f-zalohy').value = t.zalohy;
            document.getElementById('f-najem').value = t.najem;
            document.getElementById('f-vs').value = t.vs;
            document.getElementById('f-email').value = t.email;
            document.getElementById('f-telefon').value = t.telefon;
            document.getElementById('f-city').value = t.city;
            document.getElementById('f-zip').value = t.zip;
            document.getElementById('f-typ').value = t.typ;
            
            try {
                const osm = JSON.parse(t.osmhistory || t.osm_history || "[]");
                if(osm.length === 0) addOsmRow();
                else osm.forEach(o => addOsmRow(o.rok, o.osoby, o.mesice));
            } catch(e) { addOsmRow(); }
        }
        document.getElementById('modal').style.display = 'block';
    }

    async function handleSave() {
        const osmRows = Array.from(document.querySelectorAll('.osm-row')).map(r => ({
            rok: r.querySelector('.osm-rok').value,
            osoby: r.querySelector('.osm-osoby').value,
            mesice: r.querySelector('.osm-mesice').value
        }));
        
        const years = [...new Set(osmRows.map(r => r.rok))];
        for(let y of years) {
            const sum = osmRows.filter(r => r.rok == y).reduce((s, r) => s + Number(r.mesice), 0);
            if(sum !== 12) { alert(`Chyba: Rok ${y} musí mít sumu 12 měsíců! (Aktuálně: ${sum})`); return; }
        }

        const isNew = !document.getElementById('f-rowidx').value;
        const p = {
            id: isNew ? getNextId(DATA.tenants) : "",
            rowidx: document.getElementById('f-rowidx').value,
            name: document.getElementById('f-name').value,
            unit: document.getElementById('f-unit').value,
            plocha: document.getElementById('f-plocha').value,
            zalohy: document.getElementById('f-zalohy').value,
            najem: document.getElementById('f-najem').value,
            vs: document.getElementById('f-vs').value,
            email: document.getElementById('f-email').value,
            telefon: document.getElementById('f-telefon').value,
            city: document.getElementById('f-city').value,
            zip: document.getElementById('f-zip').value,
            typ: document.getElementById('f-typ').value,
            osm_history: JSON.stringify(osmRows)
        };
        const resp = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'saveTenant', payload:p}) });
        DATA = await resp.json(); renderAdminTable(); closeModal();
    }

    // --- SHARED COSTS ---
    function addVodaRow(c='', m='', d='') {
        const div = document.createElement('div'); div.className = 'grid-3 voda-row';
        div.innerHTML = `<input type="number" class="v-cena" value="${c}" oninput="calcVoda()"><input type="number" class="v-dph" value="${d}" oninput="calcVoda()"><input type="number" class="v-m3" value="${m}" oninput="calcVoda()">`;
        document.getElementById('voda-segments').appendChild(div);
    }
    function calcVoda() {
        let sc=0, sm=0; document.querySelectorAll('.voda-row').forEach(r => {
            let c=Number(r.querySelector('.v-cena').value), d=Number(r.querySelector('.v-dph').value), m=Number(r.querySelector('.v-m3').value);
            sc += c*(1+(d/100)); sm += m;
        });
        document.getElementById('sc-voda-celkem-cena').innerText = sc.toFixed(2);
        document.getElementById('sc-voda-celkem-m3').innerText = sm.toFixed(2);
    }
    function addSrazkyRow(c='', m='') {
        const div = document.createElement('div'); div.className = 'grid srazky-row';
        div.innerHTML = `<input type="number" class="s-cena" value="${c}" oninput="calcSrazky()"><input type="number" class="s-m3" value="${m}" oninput="calcSrazky()">`;
        document.getElementById('srazky-segments').appendChild(div);
    }
    function calcSrazky() {
        let sc=0; document.querySelectorAll('.srazky-row').forEach(r => sc += Number(r.querySelector('.s-cena').value));
        document.getElementById('sc-srazky-celkem-cena').innerText = sc.toFixed(2);
    }
    function calcEleSazba() {
        let s=Number(document.getElementById('sc-ele-hlavni-start').value), e=Number(document.getElementById('sc-ele-hlavni-end').value), c=Number(document.getElementById('sc-ele-celkem-cena').value);
        let sazba = (e-s)>0 ? c/(e-s) : 0;
        document.getElementById('sc-ele-sazba-display').innerText = sazba.toFixed(2);
        document.getElementById('sc-ele-sazba').value = sazba;
    }

    async function loadSharedCosts() {
        const y = document.getElementById('shared-year').value;
        const saved = (DATA.sharedCosts || []).find(s => s.year == y);
        document.getElementById('voda-segments').innerHTML = ""; document.getElementById('srazky-segments').innerHTML = "";
        if(saved) {
            const sc = JSON.parse(saved.data);
            if(sc.voda?.segments) sc.voda.segments.forEach(seg => addVodaRow(seg.cena, seg.m3, seg.dph));
            if(sc.srazky?.segments) sc.srazky.segments.forEach(seg => addSrazkyRow(seg.cena, seg.m3));
            document.getElementById('sc-ele-hlavni-start').value = sc.ele?.hlavniStart || "";
            document.getElementById('sc-ele-hlavni-end').value = sc.ele?.hlavniEnd || "";
            document.getElementById('sc-ele-podruzny-start').value = sc.ele?.podruznyStart || "";
            document.getElementById('sc-ele-podruzny-end').value = sc.ele?.podruznyEnd || "";
            document.getElementById('sc-ele-celkem-cena').value = sc.ele?.cenaCelkem || "";
            document.getElementById('sc-odpadyCP-cena').value = sc.odpadyCP?.cena || "";
            document.getElementById('sc-odpadyAVE-cena').value = sc.odpadyAVE?.cena || "";
            document.getElementById('sc-uklid-cena').value = sc.uklid?.cena || "";
            calcVoda(); calcSrazky(); calcEleSazba();
            ['voda','srazky','ele','odpadyCP','odpadyAVE','uklid'].forEach(l => {
                document.querySelectorAll(`.chk-${l}`).forEach(c => c.checked = false);
                if(sc[l]?.tenants) sc[l].tenants.forEach(n => { let c = document.querySelector(`.chk-${l}[value="${n}"]`); if(c) c.checked = true; });
            });
        } else { addVodaRow(); addSrazkyRow(); }
    }

    async function saveSharedCosts() {
        const y = document.getElementById('shared-year').value;
        const existing = (DATA.sharedCosts || []).find(s => s.year == y);
        const p = {
            voda: { cena: document.getElementById('sc-voda-celkem-cena').innerText, m3: document.getElementById('sc-voda-celkem-m3').innerText, segments: Array.from(document.querySelectorAll('.voda-row')).map(r => ({cena: r.querySelector('.v-cena').value, dph: r.querySelector('.v-dph').value, m3: r.querySelector('.v-m3').value})), tenants: Array.from(document.querySelectorAll('.chk-voda:checked')).map(c => c.value) },
            srazky: { cena: document.getElementById('sc-srazky-celkem-cena').innerText, segments: Array.from(document.querySelectorAll('.srazky-row')).map(r => ({cena: r.querySelector('.s-cena').value, m3: r.querySelector('.s-m3').value})), tenants: Array.from(document.querySelectorAll('.chk-srazky:checked')).map(c => c.value) },
            ele: { hlavniStart: document.getElementById('sc-ele-hlavni-start').value, hlavniEnd: document.getElementById('sc-ele-hlavni-end').value, podruznyStart: document.getElementById('sc-ele-podruzny-start').value, podruznyEnd: document.getElementById('sc-ele-podruzny-end').value, cenaCelkem: document.getElementById('sc-ele-celkem-cena').value, sazba: document.getElementById('sc-ele-sazba').value, tenants: Array.from(document.querySelectorAll('.chk-ele:checked')).map(c => c.value) },
            odpadyCP: { cena: document.getElementById('sc-odpadyCP-cena').value, tenants: Array.from(document.querySelectorAll('.chk-odpadyCP:checked')).map(c => c.value) },
            odpadyAVE: { cena: document.getElementById('sc-odpadyAVE-cena').value, tenants: Array.from(document.querySelectorAll('.chk-odpadyAVE:checked')).map(c => c.value) },
            uklid: { cena: document.getElementById('sc-uklid-cena').value, tenants: Array.from(document.querySelectorAll('.chk-uklid:checked')).map(c => c.value) }
        };
        const resp = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'saveSharedCosts', id: existing ? existing.id : getNextId(DATA.sharedCosts), year: y, payload: p}) });
        DATA = await resp.json(); alert("Uloženo.");
    }

    function calculateTenantShares(year) {
        const saved = (DATA.sharedCosts || []).find(s => s.year == year); if(!saved) return null;
        const sc = JSON.parse(saved.data); let shares = {};
        const tenantsOSM = (DATA.tenants || []).map(t => {
            let osm = 0; 
            try { 
                const h = JSON.parse(t.osmhistory || t.osm_history || "[]"); 
                const filtered = h.filter(r => r.rok == year); 
                if(filtered.length>0) filtered.forEach(f => osm += Number(f.osoby)*Number(f.mesice)); 
                else osm = 12; 
            } catch(e){ osm = 12; }
            return { name: t.name, osm: osm, plocha: Number(t.plocha || 0) };
        });
        tenantsOSM.forEach(t => shares[t.name] = { voda:0, srazky:0, ele:0, odpady:0, uklid:0, celkem:0, mojeOSM: t.osm });
        const getSumOSM = (list) => tenantsOSM.filter(x => list.includes(x.name)).reduce((s, x) => s + x.osm, 0);

        if(sc.voda && Number(sc.voda.m3)>0) {
            const pV = Number(sc.voda.cena)/Number(sc.voda.m3);
            sc.voda.tenants.forEach(n => { 
                const m = (DATA.meters||[]).filter(x => x.name==n && x.year==year); 
                shares[n].voda = m.reduce((s,x)=>s+Number(x.spotreba),0)*pV; 
            });
        }
        if(sc.srazky) {
            const pM = Number(sc.srazky.cena)/593; let uziv=0;
            sc.srazky.tenants.forEach(n => { 
                if(n !== "AMK TRABANT PLZEŇ z.s.") { 
                    let pl = tenantsOSM.find(x => x.name==n)?.plocha||0; 
                    uziv+=pl; shares[n].srazky = pl*pM; 
                } 
            });
            if(sc.srazky.tenants.includes("AMK TRABANT PLZEŇ z.s.")) shares["AMK TRABANT PLZEŇ z.s."].srazky = (593-uziv)*pM;
        }
        ['ele','odpadyCP','odpadyAVE','uklid'].forEach(l => {
            if(sc[l]?.tenants?.length > 0) {
                const totalOSM = getSumOSM(sc[l].tenants); 
                const cenaOSM = totalOSM>0 ? Number(sc[l].cena||sc[l].cenaCelkem)/totalOSM : 0;
                sc[l].tenants.forEach(n => { 
                    let podil = shares[n].mojeOSM * cenaOSM; 
                    if(l.includes('odpady')) shares[n].odpady += podil; 
                    else shares[n][l] = podil; 
                    shares[n]['totalOSM_'+l] = totalOSM; 
                });
            }
        });
        for(let k in shares) shares[k].celkem = shares[k].voda + shares[k].srazky + shares[k].ele + shares[k].odpady + shares[k].uklid;
        return shares;
    }

    function generateSettlement() {
        const name = document.getElementById('f-name').value; 
        const rok = prompt("Zadejte rok vyúčtování:", 2024); if(!rok) return;
        const t = DATA.tenants.find(x => x.name == name); 
        const sh = calculateTenantShares(rok); if(!sh) return alert("Chybí data!");
        const podil = sh[name]; 
        const scSaved = DATA.sharedCosts.find(s => s.year == rok); if(!scSaved) return alert("Chybí náklady objektu!");
        const sc = JSON.parse(scSaved.data);
        const dSpl = new Date(); dSpl.setDate(dSpl.getDate()+14);
        const vs = rok.toString() + String(t.unit||"").replace(/\D/g,"").padStart(2,'0');

        const diffkWh = (Number(sc.ele.hlavniEnd) - Number(sc.ele.hlavniStart)) - (Number(sc.ele.podruznyEnd) - Number(sc.ele.podruznyStart));

        const w = window.open("", "_blank");
        w.document.write(`<html><head><style>body{font-family:sans-serif;padding:40px;line-height:1.4}table{width:100%;border-collapse:collapse}th{background:#f0f7ff;padding:10px;text-align:left}td{padding:10px;border-bottom:1px solid #eee}</style></head><body>
            <h1 style="text-align:center">VYÚČTOVÁNÍ SLUŽEB ${rok}</h1>
            <p><b>Příjemce:</b> ${t.name} (Jednotka ${t.unit})<br><b>Splatnost:</b> ${dSpl.toLocaleDateString('cs-CZ')}</p>
            <table>
                <thead><tr><th>Druh služby</th><th style="text-align:right">Náklad objektu</th><th style="text-align:right">Podíl jednotky</th></tr></thead>
                <tbody>
                    <tr><td>Společná elektřina<br><small>${diffkWh.toFixed(1)} kWh | OSM: ${podil.mojeOSM}</small></td><td style="text-align:right">${Number(sc.ele.cenaCelkem).toFixed(2)}</td><td style="text-align:right"><b>${podil.ele.toFixed(2)}</b></td></tr>
                    <tr><td>Odpady (Byty/Komerce)<br><small>Dle osoboměsíců</small></td><td style="text-align:right">-</td><td style="text-align:right"><b>${podil.odpady.toFixed(2)}</b></td></tr>
                    <tr><td>Úklid společných prostor<br><small>Dle osoboměsíců</small></td><td style="text-align:right">${Number(sc.uklid.cena).toFixed(2)}</td><td style="text-align:right"><b>${podil.uklid.toFixed(2)}</b></td></tr>
                    <tr><td>Vodné a stočné<br><small>Dle vodoměrů</small></td><td style="text-align:right">${Number(sc.voda.cena).toFixed(2)}</td><td style="text-align:right"><b>${podil.voda.toFixed(2)}</b></td></tr>
                    <tr><td>Srážkovné<br><small>Dle m²</small></td><td style="text-align:right">${Number(sc.srazky.cena).toFixed(2)}</td><td style="text-align:right"><b>${podil.srazky.toFixed(2)}</b></td></tr>
                    <tr style="background:#eee; font-size:1.2em"><td><b>CELKEM K ÚHRADĚ</b></td><td>-</td><td style="text-align:right"><b>${podil.celkem.toFixed(2)} Kč</b></td></tr>
                </tbody>
            </table>
            <div style="text-align:center;margin-top:30px">
                <img src="https://api.paylibo.com/paylibo/generator/czech/image?accountNumber=2402266265&bankCode=2010&amount=${podil.celkem.toFixed(2)}&vs=${vs}&currency=CZK">
                <p><b>VS: ${vs}</b> | Účet: 2402266265/2010</p>
            </div>
        </body></html>`);
        w.document.close();
    }

    function populateTenantLists() { 
        ['voda','srazky','odpadyCP','odpadyAVE','ele','uklid'].forEach(l => { 
            document.getElementById('list-'+l).innerHTML = (DATA.tenants||[]).map(t => `<label><input type="checkbox" class="chk-${l}" value="${t.name}"> ${t.name}</label>`).join(''); 
        }); 
    }

    function previewSharedCosts() {
        const y = document.getElementById('shared-year').value; 
        const sh = calculateTenantShares(y); if(!sh) return;
        let h = ""; 
        for(let n in sh) h += `<tr><td>${n}</td><td>${sh[n].voda.toFixed(0)}</td><td>${sh[n].srazky.toFixed(0)}</td><td>${sh[n].ele.toFixed(0)}</td><td>${sh[n].odpady.toFixed(0)}</td><td>${sh[n].uklid.toFixed(0)}</td><td>${sh[n].celkem.toFixed(0)}</td></tr>`;
        document.getElementById('preview-tbody').innerHTML = h; 
        document.getElementById('preview-section').classList.remove('hidden');
    }

    function switchTab(t) { 
        document.getElementById('tab-tenants').classList.add('hidden'); 
        document.getElementById('tab-shared').classList.add('hidden'); 
        document.getElementById('tab-'+t).classList.remove('hidden'); 
        if(t==='shared') { populateTenantLists(); loadSharedCosts(); } 
    }

    function closeModal() { document.getElementById('modal').style.display='none'; }
    function logout() { localStorage.clear(); location.reload(); }
</script>
