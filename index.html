<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <title>Správa AMK</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1, h2 { color: #2c3e50; margin-top: 0; }
        label { display: block; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; color: #7f8c8d; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #27ae60; color: white; }
        .btn-red { background: #e74c3c; color: white; }
        .btn-gray { background: #ecf0f1; color: #333; border: 1px solid #bdc3c7; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; font-size: 13px; color: #7f8c8d; border-bottom: 2px solid #ddd; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .hidden { display: none; }
        .link { font-size: 12px; color: #3498db; cursor: pointer; text-decoration: underline; text-align: center; display: block; margin-top: 15px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; overflow-y: auto; padding: 20px; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; max-width: 700px; margin: auto; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-right: 5px; display: inline-block; }
        .b-ok { background: #d4edda; color: #155724; }
        .b-wait { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .komerce-box { background: #fffbeb; padding: 15px; border-radius: 6px; margin-bottom: 15px; border-left: 4px solid #f59e0b; }
    </style>
</head>
<body>

<div id="loginSection">
    <div class="container" style="max-width: 400px; margin-top: 80px;">
        <div id="box-login">
            <h2 style="text-align: center;">Přihlášení</h2>
            <label>E-mail</label><input type="email" id="email">
            <label>Heslo</label><input type="password" id="pass">
            <button class="btn btn-blue" style="width:100%" onclick="handleLogin()">Vstoupit do systému</button>
            <a class="link" onclick="showBox('forgot')">Zapomněli jste heslo?</a>
        </div>
        <div id="box-register" class="hidden">
            <h2 style="text-align: center;">Nové heslo</h2>
            <label>Nové heslo</label><input type="password" id="reg-p1">
            <label>Heslo znovu</label><input type="password" id="reg-p2">
            <button class="btn btn-green" style="width:100%" onclick="savePassword()">Uložit a přihlásit se</button>
        </div>
        <div id="box-forgot" class="hidden">
            <h2 style="text-align: center;">Obnova hesla</h2>
            <label>E-mail</label><input type="email" id="forgot-email">
            <button class="btn btn-blue" style="width:100%" onclick="sendResetCode()">Odeslat ověřovací kód</button>
            <a class="link" onclick="showBox('login')">Zpět</a>
        </div>
        <div id="box-verify" class="hidden">
            <h2 style="text-align: center;">Ověření e-mailu</h2>
            <label>Kód z e-mailu</label><input type="text" id="verify-code">
            <button class="btn btn-green" style="width:100%" onclick="verifyCode()">Ověřit kód</button>
        </div>
    </div>
</div>

<div id="app" class="hidden">
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px;">
            <h1 id="appHeader" style="margin:0;">Administrace</h1>
            <button class="btn btn-red" onclick="location.reload()">Odhlásit se</button>
        </div>

        <div id="adminContent" class="hidden">
            <button class="btn btn-green" onclick="openEdit(null)">+ Přidat nájemníka</button>
            <table>
                <thead><tr><th>NÁJEMNÍK</th><th>JEDNOTKA</th><th>STAV PLATEB (Tento rok)</th><th>AKCE</th></tr></thead>
                <tbody id="tBody"></tbody>
            </table>
        </div>

        <div id="tenantContent" class="hidden"><div id="tView"></div></div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Karta nájemníka</h2>
        <input type="hidden" id="f-rowidx">

        <div style="background:#f1f5f9; padding: 15px; border-radius: 6px; margin-bottom: 15px;">
            <label>Typ pronájmu</label>
            <select id="f-typ" onchange="toggleTypProstoru()" style="margin-bottom:0">
                <option value="byt">Byt (Fyzická osoba)</option>
                <option value="komerce">Komerční prostor (Firma / IČO)</option>
            </select>
        </div>
        
        <div class="grid">
            <div><label id="label-name">Celé jméno</label><input type="text" id="f-name"></div>
            <div><label>Označení jednotky</label><input type="text" id="f-unit"></div>
        </div>

        <div id="komerce-fields" class="komerce-box hidden">
            <div class="grid">
                <div><label>Zastupuje (Jednatel)</label><input type="text" id="f-jednatel" style="margin-bottom:5px"></div>
                <div><label>IČO</label><input type="text" id="f-ico" style="margin-bottom:5px"></div>
            </div>
            <div style="margin-top: 10px;">
                <label style="text-transform:none; cursor:pointer;">
                    <input type="checkbox" id="f-dph" style="width:auto; display:inline-block; margin-right:5px;"> Subjekt je plátce DPH
                </label>
            </div>
        </div>

        <div style="background:#f1f5f9; padding: 10px; border-radius: 6px; margin-bottom: 15px; border-left: 4px solid #3498db;">
            <label style="color:#3498db">Přiřazený Variabilní Symbol (VS) pro platby</label>
            <input type="text" id="f-vs" placeholder="např. 202401" style="margin-bottom:0">
        </div>

        <div style="background:#f8f9fa; padding:15px; border-radius:6px; margin-bottom:15px">
            <label>Sídlo / Ulice a č.p.</label><input type="text" id="f-street">
            <div class="grid">
                <div><label>Město</label><input type="text" id="f-city"></div>
                <div><label>PSČ</label><input type="text" id="f-zip"></div>
            </div>
        </div>
        <div class="grid">
            <div><label>E-mail</label><input type="email" id="f-email"></div>
            <div><label>Telefon</label><input type="text" id="f-telefon"></div>
        </div>
        
        <div class="grid" style="grid-template-columns: 1fr 1fr 1fr">
            <div><label>Měsíční nájemné (Kč)</label><input type="number" id="f-najem"></div>
            <div><label>Měsíční zálohy (Kč)</label><input type="number" id="f-zalohy"></div>
            <div><label>Počet osob / Zaměstnanců</label><input type="number" id="f-pocetosob"></div>
        </div>
        
        <label>Platnost smlouvy do</label><input type="date" id="f-platnostdo">

        <div id="meterSection" style="background:#f8f9fa; padding:15px; border-radius:6px; margin-bottom:15px"></div>

        <div style="background: #eef7ff; padding: 15px; border-radius: 6px; margin-bottom: 20px;">
            <h4 style="margin:0 0 10px 0;">Přidat extra náklad (mimo vyúčtování)</h4>
            <label>Popis</label><input type="text" id="c-desc">
            <div class="grid">
                <div><label>Částka (Kč)</label><input type="number" id="c-price"></div>
                <div><label>Datum</label><input type="date" id="c-date"></div>
            </div>
            <button class="btn btn-blue" style="width:100%" onclick="saveOnlyCost()">Zapsat pouze tento náklad</button>
        </div>

        <div class="grid">
            <button id="saveBtn" class="btn btn-green" onclick="handleSave()">Uložit celou kartu</button>
            <button class="btn btn-gray" onclick="generateSettlement()">Vyúčtování (Roční zúčtování)</button>
        </div>
        <button class="btn btn-gray" style="width:100%; margin-top:10px; background: white;" onclick="closeModal()">Zavřít bez uložení</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzfm7aHYnfodOGT1BRlmtQexj67oMFPNCfgQlOn1WLyJbivwyrdghxKJlrgA8_pni6Y/exec"; // DOPLŇ URL!!!
    let DATA = null; let USER = null; let CUR_EMAIL = "";
    const mesiceNázvy = ["", "Leden", "Únor", "Březen", "Duben", "Květen", "Červen", "Červenec", "Srpen", "Září", "Říjen", "Listopad", "Prosinec"];

    function showBox(id) {
        document.querySelectorAll('#loginSection .container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById('box-' + id).classList.remove('hidden');
    }

    // PŘEPÍNÁNÍ UI PRO KOMERCI
    function toggleTypProstoru() {
        const typ = document.getElementById('f-typ').value;
        if (typ === 'komerce') {
            document.getElementById('komerce-fields').classList.remove('hidden');
            document.getElementById('label-name').innerText = "Název firmy";
        } else {
            document.getElementById('komerce-fields').classList.add('hidden');
            document.getElementById('label-name').innerText = "Celé jméno";
        }
    }

    async function handleLogin() {
        CUR_EMAIL = document.getElementById('email').value.trim();
        const pass = document.getElementById('pass').value;
        if(!CUR_EMAIL || !pass) return alert("Zadejte email a heslo.");
        const resp = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'login', email:CUR_EMAIL, password:pass}) });
        const res = await resp.json();
        if(res.success) { if(res.mode === 'register') showBox('register'); else { USER = res; DATA = res.allData; startApp(); } } 
        else { alert(res.msg); }
    }

    async function savePassword() {
        const p1 = document.getElementById('reg-p1').value; const p2 = document.getElementById('reg-p2').value;
        if(p1 !== p2 || p1.length < 6) return alert("Hesla se neshodují.");
        await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'setPassword', email:CUR_EMAIL, password:p1}) });
        alert("Heslo nastaveno."); location.reload();
    }

    async function sendResetCode() {
        CUR_EMAIL = document.getElementById('forgot-email').value.trim();
        await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'forgotPassword', email:CUR_EMAIL}) });
        showBox('verify');
    }

    async function verifyCode() {
        const code = document.getElementById('verify-code').value.trim();
        const resp = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'verifyCode', email:CUR_EMAIL, code:code}) });
        const res = await resp.json();
        if (res.success) showBox('register'); else alert("Neplatný kód.");
    }

    function startApp() {
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        if(USER.role === 'admin') { document.getElementById('adminContent').classList.remove('hidden'); renderAdminTable(); }
        else { document.getElementById('tenantContent').classList.remove('hidden'); renderTenantView(); }
    }

    function renderAdminTable() {
        const curM = new Date().getMonth() + 1; const curY = new Date().getFullYear();
        document.getElementById('tBody').innerHTML = DATA.tenants.map(t => {
            let dluzneMesice = [];
            let zalohaCislo = Number(t.zalohy || t.zaloha || t.mesicnizalohy || 0);
            let najemCislo = Number(t.najem || 0);
            let ocekavanoCelkem = najemCislo + zalohaCislo;

            for(let m = 1; m <= curM; m++) {
                let zaplacenoVMesici = DATA.payments.filter(p => p.name && p.name.trim().toLowerCase() === t.name.trim().toLowerCase() && p.year == curY && p.month == m).reduce((sum, p) => sum + Number(p.amount || 0), 0);
                if(ocekavanoCelkem > 0 && zaplacenoVMesici < ocekavanoCelkem) dluzneMesice.push(mesiceNázvy[m]);
            }

            let badgesHtml = dluzneMesice.length === 0 ? `<span class="badge b-ok">✓ Vše uhrazeno</span>` : dluzneMesice.map(m => `<span class="badge b-wait">❌ ${m}</span>`).join('');
            return `<tr><td><strong>${t.name}</strong><br><span style="font-size:11px; color:#7f8c8d">${t.typ === 'komerce' ? 'Komerce' : 'Byt'} | ${t.email}</span></td><td>${t.unit || '-'}</td><td>${badgesHtml}</td><td><button class="btn btn-blue" onclick="openEdit(${t.rowidx})">Spravovat</button></td></tr>`;
        }).join('');
    }

    function openEdit(idx) {
        if(!idx) {
            document.getElementById('f-rowidx').value = "";
            document.querySelectorAll('#modal input').forEach(i => { if(i.type !== 'checkbox') i.value = "" });
            document.getElementById('f-dph').checked = false;
            document.getElementById('f-typ').value = "byt";
            document.getElementById('modalTitle').innerText = "Nový nájemník";
            toggleTypProstoru();
        } else {
            const t = DATA.tenants.find(x => x.rowidx == idx);
            document.getElementById('f-rowidx').value = t.rowidx;
            document.getElementById('f-typ').value = t.typ || "byt";
            toggleTypProstoru();
            
            document.getElementById('f-name').value = t.name || "";
            document.getElementById('f-jednatel').value = t.jednatel || "";
            document.getElementById('f-ico').value = t.ico || "";
            document.getElementById('f-dph').checked = (t.dph === true || t.dph === "true" || t.dph === "Ano");
            
            document.getElementById('f-unit').value = t.unit || "";
            document.getElementById('f-vs').value = t.vs || ""; 
            document.getElementById('f-street').value = t.street || "";
            document.getElementById('f-city').value = t.city || "";
            document.getElementById('f-zip').value = t.zip || "";
            document.getElementById('f-email').value = t.email || "";
            document.getElementById('f-telefon').value = t.telefon || "";
            document.getElementById('f-najem').value = t.najem || 0;
            document.getElementById('f-zalohy').value = t.zalohy || t.zaloha || t.mesicnizalohy || 0;
            document.getElementById('f-pocetosob').value = t.pocetosob || t.osob || 1;
            
            if(t.platnostdo) document.getElementById('f-platnostdo').value = new Date(t.platnostdo).toISOString().split('T')[0];

            const mHist = DATA.meters.filter(m => m.name && t.name && m.name.toString().trim().toLowerCase() === t.name.toString().trim().toLowerCase());
            const last = mHist[mHist.length-1];
            document.getElementById('meterSection').innerHTML = last ? 
                `<div class="grid"><div><label>Minulý stav</label><input id="f-meterStart" value="${last.koncovy}" readonly style="background:#eee"></div><div><label>Nový odečet</label><input type="number" id="f-meterEnd"></div></div>` :
                `<label>Počáteční stav vodoměru</label><input type="number" id="f-meterStart">`;
        }
        document.getElementById('modal').style.display = 'block';
    }

    async function handleSave() {
        const btn = document.getElementById('saveBtn'); btn.innerText = "Ukládám...";
        const p = {
            rowidx: document.getElementById('f-rowidx').value,
            typ: document.getElementById('f-typ').value,
            name: document.getElementById('f-name').value,
            jednatel: document.getElementById('f-jednatel').value,
            ico: document.getElementById('f-ico').value,
            dph: document.getElementById('f-dph').checked ? "Ano" : "Ne",
            unit: document.getElementById('f-unit').value,
            vs: document.getElementById('f-vs').value, 
            street: document.getElementById('f-street').value,
            city: document.getElementById('f-city').value,
            zip: document.getElementById('f-zip').value,
            email: document.getElementById('f-email').value,
            telefon: document.getElementById('f-telefon').value,
            najem: document.getElementById('f-najem').value,
            zalohy: document.getElementById('f-zalohy').value,
            pocetosob: document.getElementById('f-pocetosob').value,
            platnostdo: document.getElementById('f-platnostdo').value,
            meterStart: document.getElementById('f-meterStart')?.value || "",
            meterEnd: document.getElementById('f-meterEnd')?.value || ""
        };
        const resp = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'saveTenant', payload:p}) });
        DATA = await resp.json();
        renderAdminTable(); btn.innerText = "Uložit celou kartu"; closeModal();
    }

    async function saveOnlyCost() {
        const p = { name: document.getElementById('f-name').value, desc: document.getElementById('c-desc').value, price: document.getElementById('c-price').value, date: document.getElementById('c-date').value, year: new Date(document.getElementById('c-date').value).getFullYear() };
        if(!p.name || !p.price || !p.date) return alert("Vyplňte jméno, částku a datum!");
        const resp = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'addCost', payload:p}) });
        DATA = await resp.json(); alert("Zapsáno."); document.getElementById('c-desc').value = ""; document.getElementById('c-price').value = "";
    }

    function generateSettlement() {
        const name = document.getElementById('f-name').value.trim();
        if(!name) return alert("Vyberte nájemníka.");
        
        const vybranyRok = prompt("Zadejte rok pro vyúčtování (např. 2024):", new Date().getFullYear());
        if(!vybranyRok || isNaN(vybranyRok)) return; 

        const t = DATA.tenants.find(x => x.name.toString().trim().toLowerCase() === name.toLowerCase());
        
        const tZaloha = Number(t.zalohy || t.zaloha || t.mesicnizalohy || 0);
        const tNajem = Number(t.najem || 0);
        const mesicniPredpis = tZaloha + tNajem;

        const platbyRoku = DATA.payments.filter(p => p.name && p.name.trim().toLowerCase() === name.toLowerCase() && p.year == vybranyRok);
        const celkemZaplaceno = platbyRoku.reduce((sum, p) => sum + Number(p.amount || 0), 0);
        
        let pocetMesicu = 0;
        if(mesicniPredpis > 0) { pocetMesicu = Math.floor(celkemZaplaceno / mesicniPredpis); }
        
        const celkemVybranoNaZalohach = pocetMesicu * tZaloha;
        const celkemVybranoNaNajmu = pocetMesicu * tNajem;

        const costs = DATA.costs.filter(c => c.name && c.name.toString().trim().toLowerCase() === name.toLowerCase() && c.year == vybranyRok);
        const totNaklady = costs.reduce((sum, c) => sum + Number(c.price || 0), 0);
        
        let nakladyHtml = costs.map(c => `<tr><td style="border:1px solid #ddd; padding:10px;">${c.description || c.desc || 'Náklad'} (${c.date ? new Date(c.date).toLocaleDateString('cs-CZ') : ''})</td><td style="border:1px solid #ddd; padding:10px; text-align:right;">${c.price} Kč</td></tr>`).join('');
        if(costs.length === 0) nakladyHtml = `<tr><td colspan="2" style="border:1px solid #ddd; padding:10px; text-align:center;">V tomto roce nebyly evidovány žádné náklady</td></tr>`;

        const vysledek = celkemVybranoNaZalohach - totNaklady;

        // Pokud je to komerce, vložíme IČO do faktury
        const icoHtml = t.typ === 'komerce' && t.ico ? `<br>IČO: ${t.ico}` : '';

        const w = window.open("", "_blank");
        w.document.write(`<html><body style="font-family:Arial, sans-serif; padding:40px; color: #333;">
            <div style="max-width:800px; margin:auto; border:1px solid #ddd; padding:40px; box-shadow: 0 0 10px rgba(0,0,0,0.05);">
                <h1 style="text-align:center; color: #2c3e50;">ROČNÍ ZÚČTOVÁNÍ ZÁLOH ${vybranyRok}</h1>
                <div style="display:flex; justify-content:space-between; margin-top:30px; margin-bottom:30px;">
                    <div><strong>Poskytovatel:</strong><br>AMK TRABANT PLZEŇ z.s.<br>IČ: 45333637<br>Úslavská 75, Plzeň</div>
                    <div style="text-align:right;"><strong>Příjemce:</strong><br>${t.name}${icoHtml}<br>${t.street||''}<br>${t.zip||''} ${t.city||''}</div>
                </div>
                <hr style="border:0; border-top:1px solid #eee; margin-bottom: 20px;">
                
                <h3>1. Rekapitulace plateb (${vybranyRok})</h3>
                <p>Měsíční předpis: Nájemné ${tNajem} Kč + Zálohy ${tZaloha} Kč = Celkem ${mesicniPredpis} Kč / měsíc.</p>
                <table style="width:100%; border-collapse:collapse; margin-bottom:30px;">
                    <tr><td style="border:1px solid #ddd; padding:10px;">Počet plně uhrazených měsíců:</td><td style="border:1px solid #ddd; padding:10px; text-align:right;"><strong>${pocetMesicu}</strong></td></tr>
                    <tr><td style="border:1px solid #ddd; padding:10px;">Z toho uhrazeno na nájemném (${pocetMesicu} x ${tNajem} Kč):</td><td style="border:1px solid #ddd; padding:10px; text-align:right;">${celkemVybranoNaNajmu} Kč</td></tr>
                    <tr style="background:#f8f9fa;"><td style="border:1px solid #ddd; padding:10px; font-weight:bold;">Z toho zaplaceno na zálohách na služby (${pocetMesicu} x ${tZaloha} Kč):</td><td style="border:1px solid #ddd; padding:10px; text-align:right; font-weight:bold;">${celkemVybranoNaZalohach} Kč</td></tr>
                </table>

                <h3>2. Rozpis skutečných nákladů na služby</h3>
                <table style="width:100%; border-collapse:collapse; margin-bottom:30px;">
                    <tr style="background:#f8f9fa;"><th style="border:1px solid #ddd; padding:10px; text-align:left;">Položka / Služba</th><th style="border:1px solid #ddd; padding:10px; text-align:right;">Cena</th></tr>
                    ${nakladyHtml}
                    <tr><td style="border:1px solid #ddd; padding:10px; font-weight:bold; text-align:right;">Skutečné náklady CELKEM:</td><td style="border:1px solid #ddd; padding:10px; text-align:right; font-weight:bold; color:#e74c3c;">- ${totNaklady} Kč</td></tr>
                </table>

                <h3>3. Finální vyrovnání služeb</h3>
                <table style="width:100%; border-collapse:collapse;">
                    <tr><td style="border:1px solid #ddd; padding:15px; font-size:1.2em;"><strong>VÝSLEDEK ZÚČTOVÁNÍ (Zálohy mínus Náklady)</strong></td>
                    <td style="border:1px solid #ddd; padding:15px; text-align:right; font-size:1.2em; font-weight:bold; color:${vysledek>=0?'#27ae60':'#e74c3c'};">
                        ${vysledek>=0?'PŘEPLATEK':'NEDOPLATEK'} ${Math.abs(vysledek)} Kč
                    </td></tr>
                </table>
                <p style="font-size: 11px; color: #95a5a6; margin-top: 40px; text-align: center;">
                    Vygenerováno dne: ${new Date().toLocaleDateString('cs-CZ')}
                </p>
            </div></body></html>`);
        w.document.close();
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function renderTenantView() {
        const t = DATA.tenants.find(x => x.email.toLowerCase() === USER.email.toLowerCase());
        document.getElementById('appHeader').innerText = "Vítejte, " + (t ? t.name : "Nájemníku");
        document.getElementById('tView').innerHTML = t ? `<div style="background:white; padding:30px; border-radius:8px; border: 1px solid #eee;"><h3>Vaše jednotka: ${t.unit}</h3><p>Nájem: <b>${t.najem} Kč</b></p><p>Zálohy: <b>${t.zalohy || t.zaloha || 0} Kč</b></p><p>VS pro platby: <b>${t.vs || 'Není zadán'}</b></p></div>` : "";
    }
</script>
</body>
</html>
