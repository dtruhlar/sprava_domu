<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Správa nájmů - GitHub Edition</title>
    </head>
<body>
    <script>
        // !!! SEM VLOŽ URL, KTEROU JSI DOSTAL Z GOOGLE APPS SCRIPTU !!!
        const API_URL = "https://script.google.com/macros/s/AKfycb...TVOJE_ID.../exec";

        let S = { tenants: [], payments: [] };

        // Načtení dat (místo google.script.run)
        async function load() {
            try {
                const response = await fetch(API_URL);
                S = await response.json();
                render(); // Tvá funkce pro vykreslení tabulky
            } catch (err) {
                console.error("Chyba při načítání dat:", err);
            }
        }

        // Uložení dat (místo google.script.run)
        async function save() {
            const p = {
                name: document.getElementById('f-name').value,
                // ... další pole
            };

            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors', // Důležité pro Google Apps Script
                body: JSON.stringify({
                    action: 'saveTenant',
                    payload: p
                })
            });
            
            setTimeout(load, 1000); // Počkáme sekundu a refreshneme
            closeM();
        }

        // Smazání
        async function del(rowidx) {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    action: 'deleteTenant',
                    rowidx: rowidx
                })
            });
            setTimeout(load, 1000);
        }

        window.onload = load;
    </script>
</body>
</html>
