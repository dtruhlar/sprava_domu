<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Property Manager Pro | GitHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb; --primary-hover: #1d4ed8;
            --danger: #ef4444; --success: #10b981;
            --bg: #f8fafc; --card: #ffffff;
            --text: #1e293b; --text-sub: #64748b;
            --border: #e2e8f0; --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
        .topbar { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; padding: 15px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--primary); letter-spacing: -0.5px; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow); padding: 25px; margin-bottom: 25px; }
        .table-res { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; color: var(--text-sub); font-size: 0.75rem; text-transform: uppercase; border-bottom: 2px solid var(--border); }
        td { padding: 16px 12px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; }
        .b-success { background: #dcfce7; color: #166534; }
        .b-unpaid { background: #fee2e2; color: #991b1b; }
        .btn { padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border); cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .btn-p { background: var(--primary); color: white; border: none; }
        .btn-danger { color: var(--danger); border-color: #fecaca; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 600px; max-height: 90vh; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-sub); margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; font-family: inherit; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: #e2e8f0; z-index: 2000; display: none; }
        #loader-fill { width: 30%; height: 100%; background: var(--primary); animation: loading 1.5s infinite linear; }
        @keyframes loading { from { margin-left: -30%; } to { margin-left: 100%; } }
        .meter-box { background: #f1f5f9; padding: 15px; border-radius: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="loader"><div id="loader-fill"></div></div>

<div class="topbar">
    <div class="logo">REALTY<span style="font-weight:300">FLOW</span></div>
    <button class="btn btn-p" onclick="openModal()">+ Přidat nájemníka</button>
</div>

<div class="container">
    <div class="card">
        <h2 style="margin-bottom: 20px;">Aktivní nájemníci</h2>
        <div class="table-res">
            <table id="mainTable">
                <thead>
                    <tr>
                        <th>Nájemník</th>
                        <th>Jednotka</th>
                        <th>Měsíčně</th>
                        <th>Platnost do</th>
                        <th>Stav</th>
                        <th>Akce</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="mTitle" style="margin-bottom: 20px;">Karta nájemníka</h2>
        <input type="hidden" id="f-rowidx">
        <label>Celé jméno</label><input type="text" id="f-name">
        <div class="grid">
            <div><label>Jednotka</label><input type="text" id="f-unit"></div>
            <div><label>Počet osob</label><input type="number" id="f-pocetosob"></div>
        </div>
        <div class="grid">
            <div><label>Nájemné (Kč)</label><input type="number" id="f-najem"></div>
            <div><label>Zálohy (Kč)</label><input type="number" id="f-zalohy"></div>
        </div>
        <div class="grid">
            <div><label>Telefon</label><input type="text" id="f-telefon"></div>
            <div><label>Email</label><input type="email" id="f-email"></div>
        </div>
        <label>Platnost smlouvy do</label><input type="date" id="f-platnostdo">
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border);">
        <h3 style="margin-bottom: 10px;">Stav vodoměru</h3>
        <div id="meter-container" class="meter-box"></div>
        <div style="display: flex; gap: 10px; margin-top: 25px;">
            <button class="btn btn-p" style="flex: 2" onclick="handleSave()">Uložit vše</button>
            <button id="delBtn" class="btn btn-danger" style="flex: 1; display:none" onclick="handleDelete()">Smazat</button>
            <button class="btn" style="flex: 1" onclick="closeModal()">Zrušit</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzfm7aHYnfodOGT1BRlmtQexj67oMFPNCfgQlOn1WLyJbivwyrdghxKJlrgA8_pni6Y/exec";
    let STATE = { tenants: [], payments: [], meters: [] };

    window.onload = loadData;

    async function loadData() {
        toggleLoader(true);
        try {
            const resp = await fetch(SCRIPT_URL);
            const data = await resp.json();
            STATE.tenants = (data.tenants || []).map(t => { let n = {}; for(let k in t) n[k.toLowerCase()] = t[k]; return n; });
            STATE.payments = (data.payments || []).map(p => { let n = {}; for(let k in p) n[k.toLowerCase()] = p[k]; return n; });
            STATE.meters = (data.meters || []).map(m => { let n = {}; for(let k in m) n[k.toLowerCase()] = m[k]; return n; });
            renderTable();
        } catch (e) { console.error(e); alert("Chyba načítání dat."); }
        toggleLoader(false);
    }

    function renderTable() {
        const tbody = document.querySelector('#mainTable tbody');
        const now = new Date();
        const curM = now.getMonth() + 1;
        const curY = now.getFullYear();
        tbody.innerHTML = STATE.tenants.map(t => {
            const isPaid = STATE.payments.some(p => String(p.name).trim().toLowerCase() === String(t.name).trim().toLowerCase() && Number(p.month) === curM && Number(p.year) === curY && p.status === "OK");
            const d = t.platnostdo ? new Date(t.platnostdo).toLocaleDateString('cs-CZ') : '-';
            return `<tr><td><b>${t.name}</b></td><td>${t.unit || ''}</td><td>${(Number(t.najem||0)+Number(t.zalohy||0)).toLocaleString()} Kč</td><td>${d}</td><td><span class="badge ${isPaid?'b-success':'b-unpaid'}">${isPaid?'● Uhrazeno':'○ Čeká'}</span></td><td><button class="btn" onclick="openEdit(${t.rowidx})">Otevřít kartu</button></td></tr>`;
        }).join('');
    }

    function openEdit(idx) {
        const t = STATE.tenants.find(x => Number(x.rowidx) === Number(idx));
        if(!t) return;
        
        // Robustní hledání historie: trim a malé písmena pro jistotu
        const mHistory = STATE.meters.filter(x => String(x.name).trim().toLowerCase() === String(t.name).trim().toLowerCase());
        const lastEntry = mHistory.length > 0 ? mHistory[mHistory.length - 1] : null;

        document.getElementById('f-rowidx').value = t.rowidx;
        document.getElementById('f-name').value = t.name || "";
        document.getElementById('f-unit').value = t.unit || "";
        document.getElementById('f-najem').value = t.najem || 0;
        document.getElementById('f-zalohy').value = t.zalohy || 0;
        document.getElementById('f-email').value = t.email || "";
        document.getElementById('f-telefon').value = t.telefon || "";
        document.getElementById('f-pocetosob').value = t.pocetosob || 1;
        document.getElementById('f-platnostdo').value = t.platnostdo ? new Date(t.platnostdo).toISOString().split('T')[0] : "";
        
        const mContainer = document.getElementById('meter-container');
        if (!lastEntry) {
            mContainer.innerHTML = `<label>Počáteční stav (při nastěhování)</label><input type="number" id="f-meterStart" placeholder="Zadejte výchozí stav"><input type="hidden" id="f-meterEnd" value="">`;
        } else {
            // Používáme klíč 'koncovy' (podle tvé tabulky Meters)
            const lastVal = lastEntry.koncovy || lastEntry.koncovystav || 0;
            mContainer.innerHTML = `<div class="grid" style="margin-bottom:0"><div><label>Poslední odečet</label><input type="number" id="f-meterStart" value="${lastVal}" readonly style="background:#e2e8f0"></div><div><label>Nový odečet</label><input type="number" id="f-meterEnd" placeholder="Aktuální stav"></div></div>`;
        }
        document.getElementById('delBtn').style.display = 'block';
        document.getElementById('modal').style.display = 'flex';
    }

    function openModal() {
        document.getElementById('f-rowidx').value = "";
        document.querySelectorAll('input').forEach(i => i.value = "");
        document.getElementById('meter-container').innerHTML = `<label>Počáteční stav vodoměru</label><input type="number" id="f-meterStart" placeholder="Zadejte stav"><input type="hidden" id="f-meterEnd" value="">`;
        document.getElementById('delBtn').style.display = 'none';
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function handleSave() {
        toggleLoader(true);
        const p = {
            rowidx: document.getElementById('f-rowidx').value,
            name: document.getElementById('f-name').value,
            unit: document.getElementById('f-unit').value,
            najem: document.getElementById('f-najem').value,
            zalohy: document.getElementById('f-zalohy').value,
            email: document.getElementById('f-email').value,
            telefon: document.getElementById('f-telefon').value,
            pocetosob: document.getElementById('f-pocetosob').value,
            platnostdo: document.getElementById('f-platnostdo').value,
            meterStart: document.getElementById('f-meterStart') ? document.getElementById('f-meterStart').value : "",
            meterEnd: document.getElementById('f-meterEnd') ? document.getElementById('f-meterEnd').value : ""
        };
        await fetch(SCRIPT_URL, { method:'POST', mode:'no-cors', body: JSON.stringify({action:'saveTenant', payload:p}) });
        setTimeout(() => { closeModal(); loadData(); }, 1200);
    }

    async function handleDelete() {
        if(!confirm("Smazat nájemníka?")) return;
        toggleLoader(true);
        await fetch(SCRIPT_URL, { method:'POST', mode:'no-cors', body: JSON.stringify({action:'deleteTenant', rowidx:document.getElementById('f-rowidx').value}) });
        setTimeout(() => { closeModal(); loadData(); }, 1200);
    }
    function toggleLoader(s) { document.getElementById('loader').style.display = s?'block':'none'; }
</script>
</body>
</html>
