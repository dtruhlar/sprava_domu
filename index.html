<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Správa AMK</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1, h2, h3 { color: #2c3e50; margin-top: 0; }
        label { display: block; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; color: #7f8c8d; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; transition:0.2s; }
        .btn:hover { opacity:0.9; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #27ae60; color: white; }
        .btn-red { background: #e74c3c; color: white; }
        .btn-gray { background: #ecf0f1; color: #333; border: 1px solid #bdc3c7; }
        .btn-small { padding: 6px 12px; font-size: 12px; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; min-width: 600px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; font-size: 13px; color: #7f8c8d; border-bottom: 2px solid #ddd; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .hidden { display: none !important; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; overflow-y: auto; padding: 20px; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; max-width: 800px; margin: auto; }
        .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab { padding: 12px 25px; cursor: pointer; font-weight: bold; color: #7f8c8d; border-bottom: 3px solid transparent; margin-bottom: -2px; }
        .tab.active { color: #3498db; border-bottom: 3px solid #3498db; }
        
        .box-section { background: #f8f9fa; padding: 20px; border-radius: 6px; border: 1px solid #e9ecef; margin-bottom: 20px; }
        .tenant-list { max-height: 150px; overflow-y: auto; background: white; border: 1px solid #ccc; padding: 10px; border-radius: 4px; margin-bottom: 15px; }
        .tenant-list label { display: block; font-weight: normal; text-transform: none; color: #333; margin-bottom: 5px; cursor: pointer; }
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            .grid, .grid-3 { grid-template-columns: 1fr; }
            .tabs { flex-wrap: wrap; }
            .tab { flex: 1 1 100%; text-align: center; }
        }
    </style>
</head>
<body>

<div id="loginSection">
    <div class="container" style="max-width: 400px; margin-top: 80px;">
        <div id="box-login">
            <h2 style="text-align: center;">Přihlášení</h2>
            <label>E-mail</label><input type="email" id="email">
            <label>Heslo</label><input type="password" id="pass">
            <button class="btn btn-blue" style="width:100%" onclick="handleLogin()">Vstoupit do systému</button>
        </div>
    </div>
</div>

<div id="app" class="hidden">
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <h1 id="appHeader" style="margin:0;">Administrace</h1>
            <button class="btn btn-red" onclick="logout()">Odhlásit se</button>
        </div>

        <div id="adminContent" class="hidden">
            <div class="tabs">
                <div class="tab active" id="tab-btn-tenants" onclick="switchTab('tenants')">Karty nájemníků</div>
                <div class="tab" id="tab-btn-shared" onclick="switchTab('shared')">Společné náklady a Rozúčtování</div>
            </div>

            <div id="tab-tenants">
                <button class="btn btn-green" onclick="openEdit(null)">+ Přidat nájemníka</button>
                <div class="table-responsive">
                    <table>
                        <thead><tr><th>NÁJEMNÍK</th><th>JEDNOTKA</th><th>AKCE</th></tr></thead>
                        <tbody id="tBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-shared" class="hidden">
                <div style="display:flex; align-items:flex-end; gap:20px; margin-bottom: 20px;">
                    <div style="flex:1;"><label>Vyberte rok</label><input type="number" id="shared-year" onchange="loadSharedCosts()"></div>
                    <button class="btn btn-blue" onclick="loadSharedCosts()">Načíst data</button>
                </div>

                <div class="grid">
                    <div class="box-section">
                        <h3 style="color:#3498db">1. Vodné a Stočné</h3>
                        <div id="voda-segments"></div>
                        <button class="btn btn-gray btn-small" onclick="addVodaRow()">+ Přidat úsek</button>
                        <div style="background:#eef7ff; padding:8px; border-radius:4px; font-weight:bold; margin-top:10px;">
                            Celkem s DPH: <span id="sc-voda-celkem-cena">0</span> Kč / <span id="sc-voda-celkem-m3">0</span> m³
                        </div>
                        <label>Rozúčtovat mezi:</label>
                        <div class="tenant-list" id="list-voda"></div>
                    </div>

                    <div class="box-section">
                        <h3 style="color:#2980b9">2. Srážkovné</h3>
                        <div id="srazky-segments"></div>
                        <button class="btn btn-gray btn-small" onclick="addSrazkyRow()">+ Přidat úsek</button>
                        <div style="background:#eef7ff; padding:8px; border-radius:4px; font-weight:bold; margin-top:10px;">
                            Celkem: <span id="sc-srazky-celkem-cena">0</span> Kč
                        </div>
                        <label>Rozúčtovat mezi:</label>
                        <div class="tenant-list" id="list-srazky"></div>
                    </div>
                </div>

                <div class="grid">
                    <div class="box-section">
                        <h3 style="color:#27ae60">3. Odpady</h3>
                        <label>Čistá Plzeň (Kč)</label><input type="number" id="sc-odpadyCP-cena">
                        <div class="tenant-list" id="list-odpadyCP"></div>
                        <label>AVE (Kč)</label><input type="number" id="sc-odpadyAVE-cena">
                        <div class="tenant-list" id="list-odpadyAVE"></div>
                    </div>
                    <div class="box-section">
                        <h3 style="color:#f39c12">4. Společná elektřina</h3>
                        <label>Hlavní start</label><input type="number" id="sc-ele-hlavni-start" oninput="calcEleSazba()">
                        <label>Hlavní end</label><input type="number" id="sc-ele-hlavni-end" oninput="calcEleSazba()">
                        <label>Faktura cena (Kč)</label><input type="number" id="sc-ele-celkem-cena" oninput="calcEleSazba()">
                        <div style="background:#eef7ff; padding:8px; border-radius:4px; font-weight:bold; margin-top:10px;">
                            Sazba: <span id="sc-ele-sazba-display">0</span> Kč/kWh
                            <input type="hidden" id="sc-ele-sazba">
                        </div>
                        <label>Rozúčtovat mezi:</label>
                        <div class="tenant-list" id="list-ele"></div>
                    </div>
                </div>

                <div class="box-section">
                    <h3 style="color:#8e44ad">5. Úklid</h3>
                    <label>Cena úklid (Kč)</label><input type="number" id="sc-uklid-cena">
                    <label>Rozúčtovat mezi:</label>
                    <div class="tenant-list" id="list-uklid"></div>
                </div>

                <div class="grid">
                    <button class="btn btn-green" onclick="saveSharedCosts()">💾 Uložit náklady</button>
                    <button class="btn btn-blue" onclick="previewSharedCosts()">📊 Náhled podílů</button>
                </div>
            </div>
        </div>
        <div id="tenantContent" class="hidden"><div id="tView"></div></div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Karta nájemníka</h2>
        <input type="hidden" id="f-rowidx">
        <div class="grid">
            <div><label>Jméno</label><input type="text" id="f-name"></div>
            <div><label>Jednotka</label><input type="text" id="f-unit"></div>
        </div>
        <div class="grid">
            <div><label>Plocha (m2)</label><input type="number" id="f-plocha"></div>
            <div><label>Počet osob</label><input type="number" id="f-pocetosob"></div>
        </div>
        <div class="grid">
            <div><label>Nájem (Kč)</label><input type="number" id="f-najem"></div>
            <div><label>Zálohy (Kč)</label><input type="number" id="f-zalohy"></div>
        </div>
        <div class="grid">
            <div><label>Email</label><input type="email" id="f-email"></div>
            <div><label>VS</label><input type="text" id="f-vs"></div>
        </div>
        <div id="meterSection"></div>
        
        <div style="background: #eef7ff; padding: 15px; border-radius: 6px; margin-bottom: 20px;">
            <h4 style="margin:0 0 10px 0;">Přidat mimořádný náklad</h4>
            <label>Popis</label><input type="text" id="c-desc">
            <div class="grid">
                <div><label>Částka (Kč)</label><input type="number" id="c-price"></div>
                <div><label>Datum</label><input type="date" id="c-date"></div>
            </div>
            <button class="btn btn-blue" style="width:100%" onclick="saveOnlyCost()">Zapsat náklad</button>
        </div>

        <div class="grid">
            <button class="btn btn-green" onclick="handleSave()">Uložit kartu</button>
            <button class="btn btn-gray" onclick="generateSettlement()">Zobrazit vyúčtování</button>
        </div>
        <button class="btn btn-red" onclick="closeModal()" style="width:100%; margin-top:10px;">Zavřít</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzfm7aHYnfodOGT1BRlmtQexj67oMFPNCfgQlOn1WLyJbivwyrdghxKJlrgA8_pni6Y/exec";
    let DATA = null; let USER = null; let CUR_EMAIL = "";

    // UNIVERZÁLNÍ FUNKCE PRO ZÍSKÁNÍ ID (PRO VŠECHNY LISTY)
    function getNextId(dataList) {
        if (!dataList || dataList.length === 0) return 1;
        // Předpokládáme, že ID je vždy v prvním sloupci objektu z DATA
        const ids = dataList.map(item => Number(item.id || item.ID)).filter(id => !isNaN(id)).sort((a, b) => a - b);
        let nextId = 1;
        for (let i = 0; i < ids.length; i++) {
            if (ids[i] === nextId) nextId++;
            else if (ids[i] > nextId) return nextId;
        }
        return nextId;
    }

    window.onload = function() {
        const savedE = localStorage.getItem('amk_em');
        const savedP = localStorage.getItem('amk_pw');
        if(savedE && savedP) handleLogin(savedE, savedP);
    };

    async function handleLogin(savedE, savedP) {
        CUR_EMAIL = savedE || document.getElementById('email').value.trim(); 
        const pass = savedP || document.getElementById('pass').value;
        try {
            const resp = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'login', email:CUR_EMAIL, password:pass}) });
            const res = await resp.json();
            if(res.success) { 
                localStorage.setItem('amk_em', CUR_EMAIL); localStorage.setItem('amk_pw', pass);
                USER = res; DATA = res.allData; startApp(); 
            }
        } catch(e) { alert("Chyba přihlášení."); }
    }

    function startApp() {
        document.getElementById('loginSection').classList.add('hidden'); document.getElementById('app').classList.remove('hidden');
        if(USER.role === 'admin') { document.getElementById('adminContent').classList.remove('hidden'); renderAdminTable(); }
    }

    function renderAdminTable() {
        const tBody = document.getElementById('tBody');
        tBody.innerHTML = (DATA.tenants || []).map(t => `<tr>
            <td><strong>${t.name}</strong></td><td>${t.unit}</td>
            <td><button class="btn btn-blue" onclick="openEdit(${t.rowidx})">Karta</button></td>
        </tr>`).join('');
    }

    function openEdit(idx) {
        if(!idx) { document.getElementById('f-rowidx').value = ""; document.querySelectorAll('#modal input').forEach(i => i.value = ""); }
        else {
            const t = DATA.tenants.find(x => x.rowidx == idx);
            document.getElementById('f-rowidx').value = t.rowidx;
            document.getElementById('f-name').value = t.name;
            document.getElementById('f-unit').value = t.unit;
            document.getElementById('f-plocha').value = t.plocha;
            document.getElementById('f-pocetosob').value = t.pocetosob;
            document.getElementById('f-najem').value = t.najem;
            document.getElementById('f-zalohy').value = t.zalohy;
            document.getElementById('f-email').value = t.email;
            document.getElementById('f-vs').value = t.vs;
        }
        document.getElementById('modal').style.display = 'block';
    }

    async function handleSave() {
        const isNew = !document.getElementById('f-rowidx').value;
        const p = { 
            id: isNew ? getNextId(DATA.tenants) : "", // Přidání ID pro nové nájemníky
            rowidx: document.getElementById('f-rowidx').value, 
            name: document.getElementById('f-name').value, 
            unit: document.getElementById('f-unit').value,
            plocha: document.getElementById('f-plocha').value,
            pocetosob: document.getElementById('f-pocetosob').value,
            najem: document.getElementById('f-najem').value,
            zalohy: document.getElementById('f-zalohy').value,
            email: document.getElementById('f-email').value,
            vs: document.getElementById('f-vs').value
        };
        const resp = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'saveTenant', payload:p}) });
        DATA = await resp.json(); renderAdminTable(); closeModal();
    }

    async function saveOnlyCost() {
        const p = { 
            id: getNextId(DATA.costs), // ID pro náklady
            name: document.getElementById('f-name').value, 
            desc: document.getElementById('c-desc').value, 
            price: document.getElementById('c-price').value, 
            date: document.getElementById('c-date').value, 
            year: new Date(document.getElementById('c-date').value).getFullYear() 
        };
        const resp = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'addCost', payload:p}) });
        DATA = await resp.json(); alert("Uloženo.");
    }

    // SHARED COSTS
    function addVodaRow(cena='', m3='', dph='') {
        const div = document.createElement('div'); div.className = 'grid-3 voda-row';
        div.innerHTML = `<input type="number" class="v-cena" value="${cena}" oninput="calcVoda()"><input type="number" class="v-dph" value="${dph}" oninput="calcVoda()"><input type="number" class="v-m3" value="${m3}" oninput="calcVoda()">`;
        document.getElementById('voda-segments').appendChild(div);
    }
    function calcVoda() {
        let sc = 0, sm = 0; document.querySelectorAll('.voda-row').forEach(r => { 
            let c = Number(r.querySelector('.v-cena').value||0); let d = Number(r.querySelector('.v-dph').value||0); let m = Number(r.querySelector('.v-m3').value||0);
            sc += c * (1 + (d/100)); sm += m;
        });
        document.getElementById('sc-voda-celkem-cena').innerText = sc.toFixed(2); document.getElementById('sc-voda-celkem-m3').innerText = sm.toFixed(2);
    }

    function addSrazkyRow(cena='', m3='') {
        const div = document.createElement('div'); div.className = 'grid srazky-row';
        div.innerHTML = `<input type="number" class="s-cena" value="${cena}" oninput="calcSrazky()"><input type="number" class="s-m3" value="${m3}" oninput="calcSrazky()">`;
        document.getElementById('srazky-segments').appendChild(div);
    }
    function calcSrazky() {
        let sc = 0; document.querySelectorAll('.srazky-row').forEach(r => sc += Number(r.querySelector('.s-cena').value||0));
        document.getElementById('sc-srazky-celkem-cena').innerText = sc.toFixed(2);
    }

    function calcEleSazba() {
        let s = Number(document.getElementById('sc-ele-hlavni-start').value||0); let e = Number(document.getElementById('sc-ele-hlavni-end').value||0); let c = Number(document.getElementById('sc-ele-celkem-cena').value||0);
        let sazba = (e-s)>0 ? (c/(e-s)) : 0; document.getElementById('sc-ele-sazba-display').innerText = sazba.toFixed(2); document.getElementById('sc-ele-sazba').value = sazba;
    }

    function loadSharedCosts() {
        const year = document.getElementById('shared-year').value;
        const saved = (DATA.sharedCosts || []).find(s => s.year == year);
        document.getElementById('voda-segments').innerHTML = ""; document.getElementById('srazky-segments').innerHTML = "";
        if(saved) {
            const sc = JSON.parse(saved.data);
            if(sc.voda && sc.voda.segments) sc.voda.segments.forEach(seg => addVodaRow(seg.cena, seg.m3, seg.dph));
            if(sc.srazky && sc.srazky.segments) sc.srazky.segments.forEach(seg => addSrazkyRow(seg.cena, seg.m3));
            document.getElementById('sc-ele-hlavni-start').value = sc.ele ? sc.ele.hlavniStart : "";
            document.getElementById('sc-ele-hlavni-end').value = sc.ele ? sc.ele.hlavniEnd : "";
            document.getElementById('sc-ele-celkem-cena').value = sc.ele ? sc.ele.cenaCelkem : "";
            document.getElementById('sc-odpadyCP-cena').value = sc.odpadyCP ? sc.odpadyCP.cena : "";
            document.getElementById('sc-odpadyAVE-cena').value = sc.odpadyAVE ? sc.odpadyAVE.cena : "";
            document.getElementById('sc-uklid-cena').value = sc.uklid ? sc.uklid.cena : "";
            calcVoda(); calcSrazky(); calcEleSazba();
            if(sc.voda && sc.voda.tenants) sc.voda.tenants.forEach(n => { let c = document.querySelector(`.chk-voda[value="${n}"]`); if(c) c.checked = true; });
        } else { addVodaRow(); addSrazkyRow(); }
    }

    async function saveSharedCosts() {
        const year = document.getElementById('shared-year').value;
        const existing = (DATA.sharedCosts || []).find(s => s.year == year);
        const p = {
            id: existing ? "" : getNextId(DATA.sharedCosts), // ID pro SharedCosts
            voda: { cena: document.getElementById('sc-voda-celkem-cena').innerText, m3: document.getElementById('sc-voda-celkem-m3').innerText, segments: Array.from(document.querySelectorAll('.voda-row')).map(r => ({cena: r.querySelector('.v-cena').value, dph: r.querySelector('.v-dph').value, m3: r.querySelector('.v-m3').value})), tenants: Array.from(document.querySelectorAll('.chk-voda:checked')).map(c => c.value) },
            srazky: { cena: document.getElementById('sc-srazky-celkem-cena').innerText, segments: Array.from(document.querySelectorAll('.srazky-row')).map(r => ({cena: r.querySelector('.s-cena').value, m3: r.querySelector('.s-m3').value})), tenants: Array.from(document.querySelectorAll('.chk-srazky:checked')).map(c => c.value) },
            ele: { hlavniStart: document.getElementById('sc-ele-hlavni-start').value, hlavniEnd: document.getElementById('sc-ele-hlavni-end').value, cenaCelkem: document.getElementById('sc-ele-celkem-cena').value, sazba: document.getElementById('sc-ele-sazba').value, tenants: Array.from(document.querySelectorAll('.chk-ele:checked')).map(c => c.value) },
            odpadyCP: { cena: document.getElementById('sc-odpadyCP-cena').value, tenants: Array.from(document.querySelectorAll('.chk-odpadyCP:checked')).map(c => c.value) },
            odpadyAVE: { cena: document.getElementById('sc-odpadyAVE-cena').value, tenants: Array.from(document.querySelectorAll('.chk-odpadyAVE:checked')).map(c => c.value) },
            uklid: { cena: document.getElementById('sc-uklid-cena').value, tenants: Array.from(document.querySelectorAll('.chk-uklid:checked')).map(c => c.value) }
        };
        const resp = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'saveSharedCosts', year: year, payload:p}) });
        DATA = await resp.json(); alert("Uloženo.");
    }

    function calculateTenantShares(year) {
        const saved = (DATA.sharedCosts || []).find(s => s.year == year); if(!saved) return null;
        const sc = JSON.parse(saved.data); let shares = {};
        (DATA.tenants || []).forEach(t => shares[t.name] = { voda:0, srazky:0, ele:0, odpady:0, uklid:0, celkem:0 });

        if(sc.voda && Number(sc.voda.m3) > 0) {
            const pV = Number(sc.voda.cena) / Number(sc.voda.m3);
            sc.voda.tenants.forEach(n => {
                const m = (DATA.meters || []).filter(x => x.name == n && x.year == year);
                shares[n].voda = Math.round(m.reduce((s, x) => s + Number(x.spotreba || 0), 0) * pV);
            });
        }
        if(sc.srazky) {
            const TOTAL = 593; const pM = Number(sc.srazky.cena) / TOTAL; let uziv = 0;
            sc.srazky.tenants.forEach(n => {
                if(n !== "AMK TRABANT PLZEŇ z.s.") { let t = DATA.tenants.find(x => x.name == n); let pl = Number(t?.plocha || 0); uziv += pl; shares[n].srazky = Math.round(pl * pM); }
            });
            if(sc.srazky.tenants.includes("AMK TRABANT PLZEŇ z.s.")) shares["AMK TRABANT PLZEŇ z.s."].srazky = Math.round((TOTAL - uziv) * pM);
        }
        if(sc.ele && sc.ele.tenants.length > 0) { let p = Math.round(Number(sc.ele.cenaCelkem || 0) / sc.ele.tenants.length); sc.ele.tenants.forEach(n => shares[n].ele = p); }
        if(sc.odpadyCP && sc.odpadyCP.tenants.length > 0) { let p = Math.round(Number(sc.odpadyCP.cena || 0) / sc.odpadyCP.tenants.length); sc.odpadyCP.tenants.forEach(n => shares[n].odpady += p); }
        if(sc.odpadyAVE && sc.odpadyAVE.tenants.length > 0) { let p = Math.round(Number(sc.odpadyAVE.cena || 0) / sc.odpadyAVE.tenants.length); sc.odpadyAVE.tenants.forEach(n => shares[n].odpady += p); }
        if(sc.uklid && sc.uklid.tenants.length > 0) { let p = Math.round(Number(sc.uklid.cena || 0) / sc.uklid.tenants.length); sc.uklid.tenants.forEach(n => shares[n].uklid = p); }
        for (let k in shares) shares[k].celkem = shares[k].voda + shares[k].srazky + shares[k].ele + shares[k].odpady + shares[k].uklid;
        return shares;
    }

    function generateSettlement() {
        const name = document.getElementById('f-name').value;
        const rok = prompt("Rok vyúčtování:", new Date().getFullYear()); if(!rok) return;
        const t = DATA.tenants.find(x => x.name == name);
        const shares = calculateTenantShares(rok);
        const podil = shares ? shares[name] : {voda:0, srazky:0, ele:0, odpady:0, uklid:0, celkem:0};
        const saved = (DATA.sharedCosts || []).find(s => s.year == rok);
        const sc = saved ? JSON.parse(saved.data) : null;
        const isChecked = (s) => sc && sc[s] && sc[s].tenants && sc[s].tenants.includes(name);

        let rowH = "";
        // Voda na jedno desetinné
        if(podil.voda > 0) {
            const m = (DATA.meters || []).filter(x => x.name == name && x.year == rok);
            const spotr = m.reduce((s, x) => s + Number(x.spotreba || 0), 0);
            rowH += `<tr><td><b>Vodné a stočné</b><br><small>Spotřeba: ${spotr.toFixed(1)} m³</small></td><td style="text-align:right">${sc.voda.cena} Kč</td><td style="text-align:right"><b>${podil.voda} Kč</b></td></tr>`;
        }
        if(podil.srazky > 0 && isChecked('srazky')) rowH += `<tr><td><b>Srážkovné</b></td><td style="text-align:right">${sc.srazky.cena} Kč</td><td style="text-align:right"><b>${podil.srazky} Kč</b></td></tr>`;
        if(podil.ele > 0 && isChecked('ele')) rowH += `<tr><td><b>Společná elektřina</b><br><small>Sazba: ${Number(sc.ele.sazba).toFixed(2)} | Osob: ${t.pocetosob}</small></td><td style="text-align:right">${sc.ele.cenaCelkem} Kč</td><td style="text-align:right"><b>${podil.ele} Kč</b></td></tr>`;
        if(isChecked('odpadyCP')) rowH += `<tr><td><b>Odpady CP</b></td><td style="text-align:right">${sc.odpadyCP.cena} Kč</td><td style="text-align:right"><b>${podil.odpady} Kč</b></td></tr>`;
        if(isChecked('odpadyAVE')) rowH += `<tr><td><b>Odpady AVE</b></td><td style="text-align:right">${sc.odpadyAVE.cena} Kč</td><td style="text-align:right"><b>${podil.odpady} Kč</b></td></tr>`;
        if(podil.uklid > 0 && isChecked('uklid')) rowH += `<tr><td><b>Úklid</b></td><td style="text-align:right">${sc.uklid.cena} Kč</td><td style="text-align:right"><b>${podil.uklid} Kč</b></td></tr>`;

        const tZ = Number(t.zalohy||0); const vysl = (tZ * 12) - podil.celkem;
        const dSpl = new Date(); dSpl.setDate(dSpl.getDate() + 14);

        const w = window.open("", "_blank");
        w.document.write(`<html><head><style>
            body{font-family:'Segoe UI',sans-serif;padding:40px;color:#333;} 
            table{width:100%;border-collapse:collapse;margin:20px 0;} 
            th{text-align:left;padding:12px;border-bottom:2px solid #3498db;background:#f0f7ff;color:#3498db;font-size:12px;}
            td{padding:12px;border-bottom:1px solid #eee;font-size:14px;}
            .res{margin-top:30px;padding:20px;text-align:center;border:2px solid #333;border-radius:8px;font-size:18px;}
        </style></head><body>
            <h1 style="text-align:center">VYÚČTOVÁNÍ SLUŽEB ${rok}</h1>
            <div style="display:flex;justify-content:space-between">
                <div><b>Poskytovatel:</b><br>AMK TRABANT PLZEŇ z.s.</div>
                <div style="text-align:right"><b>Příjemce:</b><br>${t.name} (Jednotka ${t.unit})</div>
            </div>
            <p style="text-align:right;font-weight:bold;margin-top:20px;">Datum splatnosti: ${dSpl.toLocaleDateString('cs-CZ')}</p>
            <table><thead><tr><th>SLUŽBA</th><th style="text-align:right">CELÝ OBJEKT</th><th style="text-align:right">NÁKLAD JEDNOTKY</th></tr></thead>
            <tbody>${rowH}<tr style="background:#f8f9fa;font-weight:bold;"><td>CELKEM</td><td>-</td><td style="text-align:right">${podil.celkem} Kč</td></tr></tbody></table>
            <div class="res" style="border-color:${vysl>=0?'#27ae60':'#e74c3c'};background:${vysl>=0?'#f0fff4':'#fff5f5'}">
                VÝSLEDEK: <b style="color:${vysl>=0?'#27ae60':'#e74c3c'}">${vysl>=0?'PŘEPLATEK':'NEDOPLATEK'} ${Math.abs(vysl)} Kč</b>
            </div>
        </body></html>`);
        w.document.close();
    }

    // Pomocné funkce
    function populateTenantLists() { ['voda', 'srazky', 'odpadyCP', 'odpadyAVE', 'ele', 'uklid'].forEach(l => { document.getElementById('list-' + l).innerHTML = (DATA.tenants || []).map(t => `<label><input type="checkbox" class="chk-${l}" value="${t.name}"> ${t.name}</label>`).join(''); }); }
    function switchTab(tabId) { document.getElementById('tab-tenants').classList.add('hidden'); document.getElementById('tab-shared').classList.add('hidden'); document.getElementById('tab-btn-tenants').classList.remove('active'); document.getElementById('tab-btn-shared').classList.remove('active'); document.getElementById('tab-' + tabId).classList.remove('hidden'); document.getElementById('tab-btn-' + tabId).classList.add('active'); if(tabId === 'shared') { document.getElementById('shared-year').value = new Date().getFullYear(); populateTenantLists(); loadSharedCosts(); } }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function showBox(id) { document.querySelectorAll('#loginSection .container > div').forEach(d => d.classList.add('hidden')); document.getElementById('box-' + id).classList.remove('hidden'); }
    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
