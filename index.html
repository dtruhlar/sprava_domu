<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <title>RealtyFlow Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --sub: #94a3b8; --border: rgba(255,255,255,0.1); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin:0; }
        .login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(circle at top left, #1e1b4b, #0f172a); }
        .login-card { background: var(--card); padding: 40px; border-radius: 24px; width: 350px; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        #app { display: none; padding: 40px; max-width: 1000px; margin: auto; }
        input, textarea { width: 100%; padding: 12px; background: #0f172a; border: 1px solid var(--border); border-radius: 10px; color: white; margin-bottom: 12px; box-sizing: border-box; }
        label { font-size: 10px; font-weight: 700; color: var(--sub); text-transform: uppercase; display: block; margin-bottom: 4px; }
        .btn { padding: 12px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; width: 100%; }
        .btn-p { background: var(--accent); color: white; }
        .btn-o { background: transparent; border: 1px solid var(--border); color: var(--text); }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { padding: 16px; background: var(--card); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        td:first-child { border-left: 1px solid var(--border); border-radius: 12px 0 0 12px; }
        td:last-child { border-right: 1px solid var(--border); border-radius: 0 12px 12px 0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; padding: 20px; overflow-y: auto; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 20px; max-width: 600px; margin: auto; border: 1px solid var(--border); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="loginSection" class="login-screen">
    <div id="box-login" class="login-card">
        <h2 style="margin:0 0 20px 0">Přihlášení</h2>
        <label>E-mail</label><input type="email" id="email">
        <label>Heslo</label><input type="password" id="pass">
        <button class="btn btn-p" onclick="handleLogin()">Vstoupit</button>
    </div>
    <div id="box-register" class="login-card hidden">
        <h2>Nové heslo</h2>
        <label>Nové heslo (min 6 znaků)</label><input type="password" id="reg-p1">
        <label>Potvrzení</label><input type="password" id="reg-p2">
        <button class="btn btn-p" onclick="savePassword()">Nastavit a přihlásit</button>
    </div>
</div>

<div id="app">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px">
        <h1 id="appHeader">Správa</h1>
        <button class="btn btn-o" style="width:auto" onclick="location.reload()">Odhlásit</button>
    </div>
    <div id="adminContent" style="display:none">
        <button class="btn btn-p" style="width:auto; margin-bottom:20px" onclick="openModal()">+ Přidat nájemníka</button>
        <table id="tBody"></table>
    </div>
    <div id="tenantContent" style="display:none">
        <div id="tView"></div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2>Editace nájemníka</h2>
        <input type="hidden" id="f-rowidx">
        <label>Jméno</label><input type="text" id="f-name">
        <div class="grid">
            <div><label>Ulice</label><input type="text" id="f-street"></div>
            <div class="grid"><div><label>Město</label><input type="text" id="f-city"></div><div><label>PSČ</label><input type="text" id="f-zip"></div></div>
        </div>
        <div class="grid">
            <div><label>Email</label><input type="text" id="f-email"></div>
            <div><label>Telefon</label><input type="text" id="f-telefon"></div>
        </div>
        <div class="grid">
            <div><label>Nájem</label><input type="number" id="f-najem"></div>
            <div><label>Zálohy</label><input type="number" id="f-zalohy"></div>
        </div>
        <div class="grid">
            <div><label>Jednotka</label><input type="text" id="f-unit"></div>
            <div><label>Smlouva do</label><input type="date" id="f-platnostdo"></div>
        </div>
        <div id="meterSection" style="margin:15px 0; padding:15px; background:rgba(0,0,0,0.2); border-radius:10px"></div>
        
        <div style="background:rgba(0,0,0,0.2); padding:15px; border-radius:10px; margin-bottom:15px">
            <label>Extra náklad (Popis)</label><input type="text" id="c-desc">
            <div class="grid">
                <div><label>Částka</label><input type="number" id="c-price"></div>
                <div><label>Datum</label><input type="date" id="c-date"></div>
            </div>
            <button class="btn btn-o" onclick="saveOnlyCost()">Uložit pouze náklad</button>
        </div>

        <div class="grid">
            <button id="saveBtn" class="btn btn-p" onclick="handleSave()">Uložit vše</button>
            <button class="btn btn-o" style="background:#000" onclick="generateSettlement()">Faktura</button>
        </div>
        <button class="btn btn-o" style="width:100%; border:none; margin-top:10px" onclick="closeModal()">Zavřít</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzfm7aHYnfodOGT1BRlmtQexj67oMFPNCfgQlOn1WLyJbivwyrdghxKJlrgA8_pni6Y/exec";
    let DATA = null; let USER = null; let CUR_EMAIL = "";

    async function handleLogin() {
        CUR_EMAIL = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const resp = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'login', email:CUR_EMAIL, password:pass}) });
        const res = await resp.json();
        
        if(res.success) {
            if(res.mode === 'register') {
                document.getElementById('box-login').classList.add('hidden');
                document.getElementById('box-register').classList.remove('hidden');
            } else {
                USER = res; DATA = res.allData;
                startApp();
            }
        } else { alert(res.msg); }
    }

    async function savePassword() {
        const p1 = document.getElementById('reg-p1').value;
        const p2 = document.getElementById('reg-p2').value;
        if(p1 !== p2 || p1.length < 6) return alert("Chyba hesla.");
        await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'setPassword', email:CUR_EMAIL, password:p1}) });
        alert("Heslo nastaveno, nyní se přihlaste.");
        location.reload();
    }

    function startApp() {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        if(USER.role === 'admin') {
            document.getElementById('adminContent').style.display = 'block';
            renderAdminTable();
        } else {
            document.getElementById('tenantContent').style.display = 'block';
            renderTenantView();
        }
    }

    function renderAdminTable() {
        document.getElementById('tBody').innerHTML = DATA.tenants.map(t => `
            <tr>
                <td><b>${t.name}</b><br><small>${t.email}</small></td>
                <td>${t.unit || '-'}</td>
                <td><button class="btn btn-o" style="width:auto" onclick="openEdit(${t.rowidx})">Spravovat</button></td>
            </tr>
        `).join('');
    }

    function openEdit(idx) {
        const t = DATA.tenants.find(x => x.rowidx == idx);
        document.getElementById('f-rowidx').value = t.rowidx;
        document.getElementById('f-name').value = t.name || "";
        document.getElementById('f-street').value = t.street || "";
        document.getElementById('f-city').value = t.city || "";
        document.getElementById('f-zip').value = t.zip || "";
        document.getElementById('f-email').value = t.email || "";
        document.getElementById('f-telefon').value = t.telefon || "";
        document.getElementById('f-najem').value = t.najem || 0;
        document.getElementById('f-zalohy').value = t.zalohy || 0;
        document.getElementById('f-unit').value = t.unit || "";
        if(t.platnostdo) document.getElementById('f-platnostdo').value = new Date(t.platnostdo).toISOString().split('T')[0];

        const mHist = DATA.meters.filter(m => m.name && t.name && m.name.trim() === t.name.trim());
        const last = mHist[mHist.length-1];
        document.getElementById('meterSection').innerHTML = last ? 
            `<div class="grid"><div><label>Minulý</label><input id="f-meterStart" value="${last.koncovy}" readonly></div><div><label>Nový stav</label><input type="number" id="f-meterEnd"></div></div>` :
            `<label>První stav vodoměru</label><input type="number" id="f-meterStart">`;
        
        document.getElementById('modal').style.display = 'block';
    }

    async function handleSave() {
        document.getElementById('saveBtn').innerText = "Ukládám...";
        const p = {
            rowidx: document.getElementById('f-rowidx').value,
            name: document.getElementById('f-name').value,
            street: document.getElementById('f-street').value,
            city: document.getElementById('f-city').value,
            zip: document.getElementById('f-zip').value,
            email: document.getElementById('f-email').value,
            telefon: document.getElementById('f-telefon').value,
            najem: document.getElementById('f-najem').value,
            zalohy: document.getElementById('f-zalohy').value,
            unit: document.getElementById('f-unit').value,
            platnostdo: document.getElementById('f-platnostdo').value,
            meterStart: document.getElementById('f-meterStart')?.value || "",
            meterEnd: document.getElementById('f-meterEnd')?.value || ""
        };
        const resp = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'saveTenant', payload:p}) });
        DATA = await resp.json();
        renderAdminTable();
        document.getElementById('saveBtn').innerText = "Uložit vše";
        closeModal();
    }

    async function saveOnlyCost() {
        const p = { name: document.getElementById('f-name').value, desc: document.getElementById('c-desc').value, price: document.getElementById('c-price').value, date: document.getElementById('c-date').value, year: new Date(document.getElementById('c-date').value).getFullYear() };
        const resp = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'addCost', payload:p}) });
        DATA = await resp.json();
        alert("Náklad přidán.");
    }

    function generateSettlement() {
        const name = document.getElementById('f-name').value;
        const t = DATA.tenants.find(x => x.name === name);
        const curY = new Date().getFullYear();
        const costs = DATA.costs.filter(c => c.name && c.name.trim() === name.trim() && c.year == curY);
        const totZ = Number(t.zalohy || 0) * 12;
        const totC = costs.reduce((s, c) => s + Number(c.price || 0), 0);
        const diff = totZ - totC;

        const w = window.open("", "_blank");
        w.document.write(`<html><body style="font-family:sans-serif;padding:40px">
            <div style="border:1px solid #eee;padding:30px;max-width:600px;margin:auto">
                <h2>VYÚČTOVÁNÍ ${curY}</h2>
                <p><b>Dodavatel:</b> AMK TRABANT PLZEŇ z.s.</p><hr>
                <p><b>Odběratel:</b> ${t.name}<br>${t.street||''}, ${t.city||''}</p>
                <table style="width:100%;margin-top:20px">
                    <tr><td>Zálohy celkem:</td><td style="text-align:right">${totZ} Kč</td></tr>
                    <tr><td>Náklady celkem:</td><td style="text-align:right">-${totC} Kč</td></tr>
                    <tr style="font-size:20px;font-weight:bold"><td>VÝSLEDEK:</td><td style="text-align:right;color:${diff>=0?'green':'red'}">${diff>=0?'PŘEPLATEK':'NEDOPLATEK'} ${Math.abs(diff)} Kč</td></tr>
                </table>
            </div></body></html>`);
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function renderTenantView() {
        const t = DATA.tenants.find(x => x.email === USER.email);
        document.getElementById('appHeader').innerText = "Vítejte, " + (t ? t.name : "nájemníku");
        document.getElementById('tView').innerHTML = t ? `<h3>Jednotka: ${t.unit}</h3><p>Měsíční nájem: ${t.najem} Kč</p><p>Zálohy: ${t.zalohy} Kč</p>` : "Data nenalezena.";
    }
</script>
</body>
</html>
