<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <title>RealtyFlow Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --sub: #94a3b8; --border: rgba(255,255,255,0.1); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin:0; }
        .login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(circle at top left, #1e1b4b, #0f172a); }
        .login-card { background: var(--card); padding: 40px; border-radius: 24px; width: 380px; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        #app { display: none; padding: 40px; max-width: 1000px; margin: auto; }
        input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid var(--border); border-radius: 10px; color: white; margin-bottom: 12px; box-sizing: border-box; font-family: inherit; }
        label { font-size: 10px; font-weight: 700; color: var(--sub); text-transform: uppercase; margin-bottom: 4px; display: block; }
        .btn { padding: 12px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; width: 100%; margin-top: 10px; }
        .btn-p { background: var(--accent); color: white; }
        .btn-o { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .link { font-size: 12px; color: var(--accent); cursor: pointer; text-align: center; display: block; margin-top: 15px; text-decoration: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="loginSection" class="login-screen">
    <div id="box-login" class="login-card">
        <h2 style="margin:0 0 20px 0">Vítejte v <span style="color:var(--accent)">RealtyFlow</span></h2>
        <label>E-mail</label><input type="email" id="email">
        <div id="passArea">
            <label>Heslo</label><input type="password" id="pass">
        </div>
        <button class="btn btn-p" onclick="handleLogin()">Přihlásit se</button>
        <a class="link" onclick="showBox('forgot')">Zapomenuté heslo?</a>
    </div>

    <div id="box-register" class="login-card hidden">
        <h2 style="margin:0 0 10px 0">Nové heslo</h2>
        <p style="font-size:13px; color:var(--sub); margin-bottom:20px">Vypadá to, že se přihlašujete poprvé. Nastavte si bezpečné heslo.</p>
        <label>Heslo</label><input type="password" id="reg-p1">
        <label>Heslo znovu</label><input type="password" id="reg-p2">
        <button class="btn btn-p" onclick="savePassword('register')">Uložit a vstoupit</button>
    </div>

    <div id="box-forgot" class="login-card hidden">
        <h2 style="margin:0">Obnova hesla</h2>
        <p style="font-size:13px; color:var(--sub); margin-bottom:20px">Pošleme vám kód na váš e-mail.</p>
        <label>Váš e-mail</label><input type="email" id="forgot-email">
        <button class="btn btn-p" onclick="sendResetCode()">Odeslat kód</button>
        <a class="link" onclick="showBox('login')">Zpět na přihlášení</a>
    </div>

    <div id="box-verify" class="login-card hidden">
        <h2 style="margin:0">Zadejte kód</h2>
        <p style="font-size:13px; color:var(--sub); margin-bottom:20px">Kód jsme zaslali na váš e-mail.</p>
        <label>Šestimístný kód</label><input type="text" id="verify-code">
        <button class="btn btn-p" onclick="verifyCode()">Ověřit kód</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzfm7aHYnfodOGT1BRlmtQexj67oMFPNCfgQlOn1WLyJbivwyrdghxKJlrgA8_pni6Y/exec";
    let CURRENT_EMAIL = "";

    function showBox(id) {
        document.querySelectorAll('.login-card').forEach(b => b.classList.add('hidden'));
        document.getElementById('box-' + id).classList.remove('hidden');
    }

    async function handleLogin() {
        CURRENT_EMAIL = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        
        const resp = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'login', email:CURRENT_EMAIL, password:pass}) });
        const res = await resp.json();
        
        if (res.success) {
            if (res.mode === 'register') {
                showBox('register');
            } else {
                USER = res; DATA = res.allData;
                document.getElementById('loginSection').style.display='none';
                document.getElementById('app').style.display='block';
                res.role === 'admin' ? (document.getElementById('adminContent').style.display='block', renderAdminTable()) : (document.getElementById('tenantContent').style.display='block', renderTenantView());
            }
        } else { alert(res.msg); }
    }

    async function savePassword(type) {
        const p1 = document.getElementById('reg-p1').value;
        const p2 = document.getElementById('reg-p2').value;
        if (p1 !== p2 || p1.length < 6) return alert("Hesla se neshodují nebo jsou příliš krátká (min. 6 znaků).");
        
        await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'setPassword', email:CURRENT_EMAIL, password:p1}) });
        alert("Heslo nastaveno. Nyní se můžete přihlásit.");
        location.reload();
    }

    async function sendResetCode() {
        CURRENT_EMAIL = document.getElementById('forgot-email').value;
        await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'forgotPassword', email:CURRENT_EMAIL}) });
        showBox('verify');
    }

    async function verifyCode() {
        const code = document.getElementById('verify-code').value;
        const resp = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:'verifyCode', email:CURRENT_EMAIL, code:code}) });
        const res = await resp.json();
        if (res.success) {
            showBox('register'); // Recyklujeme registrační box pro nové heslo
        } else { alert("Neplatný kód."); }
    }

    // ... (zbytek JS funkcí renderAdminTable, openEdit, handleSave z minula) ...
</script>
</body>
</html>
