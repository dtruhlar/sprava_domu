<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <title>Nájemník Úslavská Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin:0; }
        .login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 350px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        #app { display: none; padding: 20px; }
        .admin-only { display: none; }
        .tenant-view { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .invoice-box { padding: 40px; background: white; border: 1px solid #eee; font-family: 'Courier New', Courier, monospace; }
        .box { background: #f8fafc; padding: 15px; border-radius: 10px; margin-top: 15px; }
    </style>
</head>
<body>

<div id="loginSection" class="login-screen">
    <div class="card">
        <h2 style="text-align:center">RealtyFlow</h2>
        <input type="email" id="logEmail" placeholder="Email">
        <input type="password" id="logPass" placeholder="Heslo">
        <button class="btn" onclick="handleLogin()">Přihlásit se</button>
        <p style="font-size:12px; color:gray; cursor:pointer" onclick="alert('Kontaktujte správce na spravceuslavska@gmail.com pro reset hesla.')">Zapomněli jste heslo?</p>
    </div>
</div>

<div id="app">
    <div id="adminNav" class="admin-only" style="margin-bottom:20px; display:flex; justify-content:space-between">
        <h2>Admin Panel</h2>
        <button class="btn" style="width:auto" onclick="location.reload()">Odhlásit</button>
    </div>

    <div id="adminContent" class="admin-only">
        <div class="card" style="width:100%">
            <button class="btn" style="width:auto; margin-bottom:15px" onclick="openModal()">+ Nový nájemník</button>
            <table id="tenantTable" style="width:100%; border-collapse: collapse;">
                <thead><tr style="text-align:left"><th>Jméno</th><th>Jednotka</th><th>Akce</th></tr></thead>
                <tbody id="tBody"></tbody>
            </table>
        </div>
    </div>

    <div id="tenantContent" style="display:none">
        <div class="tenant-view">
            <h2 id="tWelcome">Vítejte</h2>
            <div id="tDetails" class="box"></div>
            <div id="tCosts" class="box"></div>
            <h3>Požadavek na správce</h3>
            <textarea id="tMessage" placeholder="Napište nám, co potřebujete..."></textarea>
            <button class="btn" onclick="sendTenantRequest()">Odeslat požadavek</button>
        </div>
    </div>
</div>

<div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); padding:20px; overflow-y:auto">
    <div class="card" style="width:600px; margin:auto">
        <h3>Karta nájemníka</h3>
        <input type="hidden" id="f-rowidx">
        <input type="text" id="f-name" placeholder="Jméno">
        <input type="text" id="f-unit" placeholder="Jednotka">
        <input type="date" id="f-platnostdo">
        
        <h4>Přidat samostatný náklad</h4>
        <div class="box">
            <input type="text" id="c-desc" placeholder="Popis (např. Oprava kliky)">
            <input type="number" id="c-price" placeholder="Cena Kč">
            <input type="date" id="c-date">
            <button class="btn" style="background: green" onclick="saveOnlyCost()">Přidat náklad extra</button>
        </div>

        <button class="btn" style="margin-top:10px" onclick="generateSettlement()">Vygenerovat vyúčtování (Fakturu)</button>
        <button class="btn" style="margin-top:10px; background:gray" onclick="closeModal()">Zavřít</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzfm7aHYnfodOGT1BRlmtQexj67oMFPNCfgQlOn1WLyJbivwyrdghxKJlrgA8_pni6Y/exec"; 
    let USER = null;
    let DATA = null;

    async function handleLogin() {
        const email = document.getElementById('logEmail').value;
        const pass = document.getElementById('logPass').value;
        
        const resp = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'login', email: email, password: pass })
        });
        const res = await resp.json();
        
        if(res.success) {
            USER = res;
            DATA = res.data;
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            
            if(res.role === 'admin') {
                document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'block');
                renderAdminTable();
            } else {
                document.getElementById('tenantContent').style.display = 'block';
                renderTenantView();
            }
        } else { alert("Chybné údaje"); }
    }

    function renderAdminTable() {
        document.getElementById('tBody').innerHTML = DATA.tenants.map(t => `
            <tr>
                <td>${t.name}</td>
                <td>${t.unit}</td>
                <td><button class="btn" onclick="openEdit(${t.rowidx})">Spravovat</button></td>
            </tr>
        `).join('');
    }

    function renderTenantView() {
        const t = DATA.tenants.find(x => x.email === USER.email);
        document.getElementById('tWelcome').innerText = "Vítejte, " + t.name;
        document.getElementById('tDetails').innerHTML = `
            <p>Jednotka: ${t.unit}</p>
            <p>Měsíční nájem: ${t.najem} Kč</p>
            <p>Měsíční zálohy: ${t.zalohy} Kč</p>
        `;
    }

    async function saveOnlyCost() {
        const name = document.getElementById('f-name').value;
        const desc = document.getElementById('c-desc').value;
        const price = document.getElementById('c-price').value;
        const date = document.getElementById('c-date').value;
        const year = new Date(date).getFullYear();

        await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'addCost', name: name, desc: desc, price: price, date: date, year: year })
        });
        alert("Náklad uložen.");
    }

    function generateSettlement() {
        const name = document.getElementById('f-name').value;
        const tenant = DATA.tenants.find(t => t.name === name);
        const costs = DATA.costs.filter(c => c.name === name && c.year == new Date().getFullYear());
        const totalZalohy = Number(tenant.zalohy) * 12;
        const totalCosts = costs.reduce((sum, c) => sum + Number(c.price), 0);
        const rozdil = totalZalohy - totalCosts;

        const win = window.open("", "_blank");
        win.document.write(`
            <div class="invoice-box">
                <h1>ROČNÍ VYÚČTOVÁNÍ SLUŽEB</h1>
                <p><b>Dodavatel:</b> AMK TRABANT PLZEŇ z.s., Úslavská 75, Plzeň</p>
                <p><b>IČ:</b> 45333637</p>
                <hr>
                <p><b>Nájemce:</b> ${tenant.name}, ${tenant.street}, ${tenant.city}</p>
                <h3>PŘEHLED:</h3>
                <p>Uhrazené zálohy (1-12): ${totalZalohy} Kč</p>
                <p>Skutečné náklady: ${totalCosts} Kč</p>
                <hr>
                <h2>VÝSLEDEK: ${rozdil > 0 ? "PŘEPLATEK" : "NEDOPLATEK"} ${Math.abs(rozdil)} Kč</h2>
            </div>
        `);
    }

    async function sendTenantRequest() {
        const msg = document.getElementById('tMessage').value;
        const t = DATA.tenants.find(x => x.email === USER.email);
        await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'sendRequest', name: t.name, email: t.email, message: msg })
        });
        alert("Požadavek odeslán.");
    }

    function openEdit(idx) { 
        const t = DATA.tenants.find(x => x.rowidx == idx);
        document.getElementById('f-name').value = t.name;
        document.getElementById('modal').style.display = 'block'; 
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>
</body>
</html>
